<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>simplewebserver · 日志查看器</title>
<style>
  /* ── 全局 ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --text:      #c9d1d9;
    --text-dim:  #8b949e;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --yellow:    #d29922;
    --red:       #f85149;
    --purple:    #bc8cff;
    --toolbar-h: 54px;
  }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
  }

  /* ── 顶部工具栏 ── */
  .toolbar {
    height: var(--toolbar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .toolbar-title {
    font-weight: 700;
    font-size: 15px;
    color: #f0f6fc;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .dot.off { background: var(--red); }

  select, button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  select:focus, button:focus { border-color: var(--accent); }
  button:hover { background: #21262d; }
  button.active { background: #1f6feb; border-color: #388bfd; color: #fff; }

  .gap { flex: 1; }

  #status-badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: #1a2e1a;
    color: var(--green);
    border: 1px solid #2ea04340;
    white-space: nowrap;
  }
  #status-badge.err {
    background: #2e1a1a;
    color: var(--red);
    border-color: #f8514940;
  }

  /* ── 过滤栏 ── */
  .filterbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #search-input {
    flex: 1;
    min-width: 200px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    font-family: monospace;
    outline: none;
  }
  #search-input:focus { border-color: var(--accent); }
  .level-btn {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid transparent;
    cursor: pointer;
    user-select: none;
  }
  .level-btn[data-level="DEBUG"] { color: var(--text-dim); border-color: var(--border); background: transparent; }
  .level-btn[data-level="INFO"]  { color: var(--accent);   border-color: #1f6feb40;      background: transparent; }
  .level-btn[data-level="WARN"]  { color: var(--yellow);   border-color: #d2992240;      background: transparent; }
  .level-btn[data-level="ERROR"] { color: var(--red);      border-color: #f8514940;      background: transparent; }
  .level-btn.active[data-level="DEBUG"] { background: #21262d;   border-color: var(--border);  color: var(--text); }
  .level-btn.active[data-level="INFO"]  { background: #1f3a6e;   border-color: #1f6feb;         color: var(--accent); }
  .level-btn.active[data-level="WARN"]  { background: #3d2e0a;   border-color: #d29922;         color: var(--yellow); }
  .level-btn.active[data-level="ERROR"] { background: #3d0a0a;   border-color: #f85149;         color: var(--red); }
  #line-count { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

  /* ── 日志区域 ── */
  .log-wrap {
    flex: 1;
    overflow: auto;
    padding: 8px 0;
  }
  #log-table {
    width: 100%;
    border-collapse: collapse;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
    font-size: 12.5px;
  }
  #log-table tr { border-bottom: 1px solid transparent; }
  #log-table tr:hover { background: #21262d; }
  #log-table td {
    padding: 2px 8px;
    vertical-align: top;
    white-space: nowrap;
  }
  .td-lno  { color: var(--text-dim); user-select: none; text-align: right; padding-right: 12px; min-width: 48px; }
  .td-time { color: #56d364; min-width: 160px; }
  .td-lvl  { font-weight: 700; min-width: 52px; text-align: center; }
  .td-pid  { color: var(--purple); min-width: 80px; }
  .td-msg  { color: var(--text); white-space: pre-wrap; word-break: break-all; }

  .lvl-DEBUG { color: var(--text-dim); }
  .lvl-INFO  { color: var(--accent);   }
  .lvl-WARN  { color: var(--yellow);   }
  .lvl-ERROR { color: var(--red);      }

  .highlight { background: #d2992240; border-radius: 2px; }

  /* ── 上传按钮 ── */
  .btn-upload {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    white-space: nowrap;
    transition: border-color .15s, background .15s;
  }
  .btn-upload:hover { background: #21262d; border-color: var(--accent); color: var(--accent); }
  #file-upload { display: none; }

  .toolbar-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* ── 拖拽覆盖层 ── */
  #drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #0d111799;
    border: 3px dashed var(--accent);
    border-radius: 12px;
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: var(--accent);
    font-size: 18px;
    font-weight: 600;
    pointer-events: none;
  }
  #drop-overlay.show { display: flex; }

  /* ── 空状态 ── */
  #empty-tip {
    display: none;
    text-align: center;
    margin-top: 80px;
    color: var(--text-dim);
  }
  #empty-tip svg { opacity: .3; margin-bottom: 12px; }

  /* ── WebData 弹层 ── */
  #wd-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(13, 17, 23, 0.72);
    backdrop-filter: blur(4px);
  }
  #wd-modal.show { display: flex; }
  .wd-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    max-width: min(960px, 100%);
    max-height: min(85vh, 900px);
    width: 100%;
    display: flex;
    flex-direction: column;
    box-shadow: 0 16px 48px rgba(0,0,0,.45);
  }
  .wd-panel-head {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .wd-panel-head h3 {
    font-size: 15px;
    font-weight: 600;
    margin-right: 8px;
  }
  .wd-tabs {
    display: flex;
    gap: 4px;
  }
  .wd-tab {
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
  }
  .wd-tab.active {
    background: #1f6feb33;
    border-color: #388bfd;
    color: var(--accent);
  }
  .wd-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-left: auto;
  }
  .wd-controls label { font-size: 12px; color: var(--text-dim); }
  #wd-close {
    margin-left: 8px;
    padding: 6px 12px;
  }
  .wd-panel-body {
    overflow: auto;
    padding: 12px 16px 16px;
    flex: 1;
  }
  .wd-pane { display: none; }
  .wd-pane.active { display: block; }
  .wd-table-wrap { overflow: auto; max-height: 56vh; margin-top: 8px; }
  .wd-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-family: "SF Mono", Consolas, monospace;
  }
  .wd-table th, .wd-table td {
    border: 1px solid var(--border);
    padding: 6px 8px;
    text-align: left;
    vertical-align: top;
  }
  .wd-table th {
    background: #21262d;
    color: var(--text-dim);
    font-weight: 600;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .wd-table tr:hover td { background: #21262d44; }
  .wd-note { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
</style>
</head>
<body>

<!-- ── 工具栏 ── -->
<div class="toolbar">
  <div class="toolbar-title">
    <div class="dot" id="status-dot"></div>
    <a href="index.html" style="color:inherit;text-decoration:none;opacity:.7;">首页</a>
    &nbsp;/&nbsp; 日志查看器
  </div>

  <select id="file-select" title="选择日志文件"></select>

  <button id="btn-refresh" title="立即刷新">&#8635; 刷新</button>

  <button id="btn-auto" class="active" title="开关自动刷新">自动刷新: 开</button>

  <select id="interval-select" title="刷新间隔">
    <option value="3000">每 3 秒</option>
    <option value="5000" selected>每 5 秒</option>
    <option value="10000">每 10 秒</option>
    <option value="30000">每 30 秒</option>
  </select>

  <div class="toolbar-sep"></div>

  <button id="btn-webdata-stats" type="button" title="WebData.db 登录汇总（IP/用户）">登录统计</button>
  <button id="btn-webdata-db" type="button" title="从 WebData.db 读取最近应用日志行">数据库日志</button>

  <div class="toolbar-sep"></div>

  <input type="file" id="file-upload" accept=".log,.txt">
  <label class="btn-upload" for="file-upload" title="上传本地日志文件查看">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    上传日志
  </label>

  <div class="gap"></div>
  <span id="status-badge">加载中…</span>
</div>

<!-- ── 过滤栏 ── -->
<div class="filterbar">
  <input id="search-input" type="text" placeholder="关键字过滤（支持正则）" spellcheck="false">
  <button class="level-btn active" data-level="DEBUG">DEBUG</button>
  <button class="level-btn active" data-level="INFO">INFO</button>
  <button class="level-btn active" data-level="WARN">WARN</button>
  <button class="level-btn active" data-level="ERROR">ERROR</button>
  <span id="line-count">0 行</span>
  <button id="btn-bottom" title="滚动到底部">↓ 最新</button>
</div>

<!-- ── 拖拽覆盖层 ── -->
<div id="drop-overlay">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
  </svg>
  松开以加载日志文件
</div>

<!-- ── 日志内容 ── -->
<div class="log-wrap" id="log-wrap">
  <div id="empty-tip">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
    </svg>
    <p>暂无匹配日志</p>
  </div>
  <table id="log-table"><tbody id="log-body"></tbody></table>
</div>

<!-- WebData 弹层 -->
<div id="wd-modal" aria-hidden="true">
  <div class="wd-panel" role="dialog" aria-labelledby="wd-modal-title">
    <div class="wd-panel-head">
      <h3 id="wd-modal-title">WebData.db</h3>
      <div class="wd-tabs">
        <button type="button" class="wd-tab active" data-wd-tab="stats">登录统计</button>
        <button type="button" class="wd-tab" data-wd-tab="dblog">数据库日志</button>
      </div>
      <div class="wd-controls" id="wd-controls-stats">
        <label>IP 排序
          <select id="wd-ip-sort">
            <option value="last">最近活动</option>
            <option value="count">登录次数</option>
          </select>
        </label>
        <label>用户排序
          <select id="wd-user-sort">
            <option value="last">最近活动</option>
            <option value="count">登录次数</option>
          </select>
        </label>
        <button type="button" id="wd-refresh-stats">刷新统计</button>
      </div>
      <div class="wd-controls" id="wd-controls-dblog" style="display:none;">
        <label>条数
          <select id="wd-dblog-limit">
            <option value="200">200</option>
            <option value="500" selected>500</option>
            <option value="1000">1000</option>
            <option value="3000">3000</option>
          </select>
        </label>
        <button type="button" id="wd-refresh-dblog">刷新</button>
      </div>
      <button type="button" id="wd-close">关闭</button>
    </div>
    <div class="wd-panel-body">
      <div id="wd-pane-stats" class="wd-pane active">
        <p class="wd-note">数据来自 <code>logs/WebData.db</code> 表 <code>login_events</code>，与 wiki 登录审计同步；可按最近时间与次数排序。</p>
        <div class="wd-table-wrap">
          <table class="wd-table" id="wd-tbl-ip">
            <thead><tr>
              <th>IP</th><th>最近时间</th><th>最近成功</th><th>尝试/成功</th><th>成功登录过的用户</th>
            </tr></thead>
            <tbody id="wd-body-ip"></tbody>
          </table>
        </div>
        <div class="wd-table-wrap" style="margin-top:16px;">
          <table class="wd-table" id="wd-tbl-user">
            <thead><tr>
              <th>用户</th><th>最近时间</th><th>最近成功</th><th>尝试/成功</th><th>成功登录过的 IP</th>
            </tr></thead>
            <tbody id="wd-body-user"></tbody>
          </table>
        </div>
      </div>
      <div id="wd-pane-dblog" class="wd-pane">
        <p class="wd-note">表 <code>app_logs</code>：与服务器文本日志对应（需启用 SQLITE3 编译且进程写入）。下列为按 id 倒序截取。</p>
        <div class="wd-table-wrap">
          <table class="wd-table">
            <thead><tr>
              <th>id</th><th>时间</th><th>级别</th><th>pid</th><th>消息</th>
            </tr></thead>
            <tbody id="wd-body-dblog"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ================================================================
   状态
   ================================================================ */
let allLines     = [];   // 原始解析结果
let autoScroll   = true; // 自动滚动到底部
let autoTimer    = null;
let activeFilter = { DEBUG: true, INFO: true, WARN: true, ERROR: true };

/* ================================================================
   日志文件列表（尝试 server_0 ~ server_9）
   ================================================================ */
const FILE_SELECT  = document.getElementById('file-select');
const STATUS_BADGE = document.getElementById('status-badge');
const STATUS_DOT   = document.getElementById('status-dot');

async function probeLogs() {
  FILE_SELECT.innerHTML = '';
  let files = [];
  try {
    const r = await fetch('/api/log-files', { cache: 'no-store' });
    if (r.ok) {
      const data = await r.json();
      if (data.ok && Array.isArray(data.files)) {
        // 服务端返回升序（server_0…），反转后最新在前
        files = data.files.slice().reverse();
      }
    }
  } catch (_) { /* 网络异常忽略 */ }

  if (files.length === 0) {
    FILE_SELECT.innerHTML = '<option value="">（无日志文件）</option>';
    setBadge('暂无日志', true);
    return;
  }
  files.forEach((f, idx) => {
    const opt = document.createElement('option');
    opt.value = `/logs/${f}`;
    opt.textContent = f + (idx === 0 ? '  ← 最新' : '');
    FILE_SELECT.appendChild(opt);
  });
  loadLog();
}

/* ================================================================
   加载并解析日志
   ================================================================ */
// 格式: [2025-01-01 12:00:00] [INFO] [pid:1234] message
const RE_LINE = /^\[(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\]\s+\[(\w+)\]\s+\[pid:(\d+)\]\s+(.*)/;

async function loadLog() {
  const url = FILE_SELECT.value;
  if (!url) return;
  try {
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const text = await r.text();
    allLines = text.split('\n').filter(l => l.trim()).map(parseLine);
    renderLog();
    setBadge(`已加载 ${allLines.length} 行`, false);
  } catch (e) {
    setBadge(`加载失败: ${e.message}`, true);
  }
}

function parseLine(raw) {
  const m = raw.match(RE_LINE);
  if (m) return { time: m[1], level: m[2], pid: m[3], msg: m[4], raw };
  return { time: '', level: 'DEBUG', pid: '', msg: raw, raw };
}

/* ================================================================
   渲染
   ================================================================ */
const LOG_BODY  = document.getElementById('log-body');
const EMPTY_TIP = document.getElementById('empty-tip');
const LINE_CNT  = document.getElementById('line-count');
const SEARCH    = document.getElementById('search-input');

function renderLog() {
  const query = SEARCH.value.trim();
  let re = null;
  if (query) {
    try { re = new RegExp(query, 'gi'); } catch (_) { re = null; }
  }

  let visible = allLines.filter(l =>
    activeFilter[l.level] !== false &&
    (!re || re.test(l.raw))
  );

  const frag = document.createDocumentFragment();
  visible.forEach((l, idx) => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td class="td-lno">${idx + 1}</td>` +
      `<td class="td-time">${esc(l.time)}</td>` +
      `<td class="td-lvl lvl-${l.level}">${esc(l.level)}</td>` +
      `<td class="td-pid">${esc(l.pid ? 'pid:' + l.pid : '')}</td>` +
      `<td class="td-msg">${highlight(esc(l.msg), re)}</td>`;
    frag.appendChild(tr);
  });

  LOG_BODY.innerHTML = '';
  LOG_BODY.appendChild(frag);

  EMPTY_TIP.style.display = visible.length === 0 ? 'block' : 'none';
  LINE_CNT.textContent = `${visible.length} / ${allLines.length} 行`;

  if (autoScroll) scrollBottom();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function highlight(html, re) {
  if (!re) return html;
  re.lastIndex = 0;
  return html.replace(re, m => `<mark class="highlight">${m}</mark>`);
}
function scrollBottom() {
  const wrap = document.getElementById('log-wrap');
  wrap.scrollTop = wrap.scrollHeight;
}
function setBadge(msg, isErr) {
  STATUS_BADGE.textContent = msg;
  STATUS_BADGE.className   = isErr ? 'err' : '';
  STATUS_DOT.className     = isErr ? 'dot off' : 'dot';
}

/* ================================================================
   事件绑定
   ================================================================ */
FILE_SELECT.addEventListener('change', loadLog);

document.getElementById('btn-refresh').addEventListener('click', loadLog);

const BTN_AUTO = document.getElementById('btn-auto');
const INTERVAL = document.getElementById('interval-select');

function startTimer() {
  stopTimer();
  autoTimer = setInterval(loadLog, parseInt(INTERVAL.value));
}
function stopTimer() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
}

BTN_AUTO.addEventListener('click', () => {
  const on = BTN_AUTO.classList.toggle('active');
  BTN_AUTO.textContent = on ? '自动刷新: 开' : '自动刷新: 关';
  on ? startTimer() : stopTimer();
});
INTERVAL.addEventListener('change', () => { if (autoTimer) startTimer(); });

document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    activeFilter[btn.dataset.level] = btn.classList.contains('active');
    renderLog();
  });
});

SEARCH.addEventListener('input', renderLog);

document.getElementById('btn-bottom').addEventListener('click', scrollBottom);

/* ── WebData 弹层 ── */
const WD_MODAL = document.getElementById('wd-modal');
const WD_CTRL_STATS = document.getElementById('wd-controls-stats');
const WD_CTRL_DBLOG = document.getElementById('wd-controls-dblog');

function wdShow(tab) {
  WD_MODAL.classList.add('show');
  WD_MODAL.setAttribute('aria-hidden', 'false');
  document.querySelectorAll('.wd-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.wdTab === tab);
  });
  document.getElementById('wd-pane-stats').classList.toggle('active', tab === 'stats');
  document.getElementById('wd-pane-dblog').classList.toggle('active', tab === 'dblog');
  WD_CTRL_STATS.style.display = tab === 'stats' ? 'flex' : 'none';
  WD_CTRL_DBLOG.style.display = tab === 'dblog' ? 'flex' : 'none';
  if (tab === 'stats') loadWebdataStats();
  else loadWebdataAppLogs();
}

function wdHide() {
  WD_MODAL.classList.remove('show');
  WD_MODAL.setAttribute('aria-hidden', 'true');
}

document.getElementById('btn-webdata-stats').addEventListener('click', () => wdShow('stats'));
document.getElementById('btn-webdata-db').addEventListener('click', () => wdShow('dblog'));
document.getElementById('wd-close').addEventListener('click', wdHide);
WD_MODAL.addEventListener('click', e => { if (e.target === WD_MODAL) wdHide(); });

document.querySelectorAll('.wd-tab').forEach(btn => {
  btn.addEventListener('click', () => wdShow(btn.dataset.wdTab));
});

document.getElementById('wd-refresh-stats').addEventListener('click', loadWebdataStats);
document.getElementById('wd-refresh-dblog').addEventListener('click', loadWebdataAppLogs);
document.getElementById('wd-ip-sort').addEventListener('change', loadWebdataStats);
document.getElementById('wd-user-sort').addEventListener('change', loadWebdataStats);
document.getElementById('wd-dblog-limit').addEventListener('change', loadWebdataAppLogs);

function wdFmtTs(v) {
  if (v == null || v === '') return '—';
  return esc(String(v));
}

async function loadWebdataStats() {
  const ipSort = document.getElementById('wd-ip-sort').value;
  const userSort = document.getElementById('wd-user-sort').value;
  const ipBody = document.getElementById('wd-body-ip');
  const userBody = document.getElementById('wd-body-user');
  ipBody.innerHTML = '<tr><td colspan="5">加载中…</td></tr>';
  userBody.innerHTML = '<tr><td colspan="5">加载中…</td></tr>';
  try {
    const r = await fetch('/api/webdata-login-stats?ip_sort=' + encodeURIComponent(ipSort) +
      '&user_sort=' + encodeURIComponent(userSort), { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (data.ok === false) throw new Error(data.error || '请求失败');

    const rip = document.createDocumentFragment();
    (data.byIp || []).forEach(row => {
      const tr = document.createElement('tr');
      const users = Array.isArray(row.users) ? row.users.join(', ') : '';
      tr.innerHTML =
        `<td>${esc(row.ip)}</td>` +
        `<td>${wdFmtTs(row.last_ts)}</td>` +
        `<td>${row.last_success_ts != null ? wdFmtTs(row.last_success_ts) : '—'}</td>` +
        `<td>${esc(String(row.attempts))} / ${esc(String(row.successes))}</td>` +
        `<td style="white-space:pre-wrap;word-break:break-all;">${esc(users)}</td>`;
      rip.appendChild(tr);
    });
    ipBody.innerHTML = '';
    ipBody.appendChild(rip);
    if ((data.byIp || []).length === 0) ipBody.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>';

    const ruser = document.createDocumentFragment();
    (data.byUser || []).forEach(row => {
      const tr = document.createElement('tr');
      const ips = Array.isArray(row.ips) ? row.ips.join(', ') : '';
      tr.innerHTML =
        `<td>${esc(row.username)}</td>` +
        `<td>${wdFmtTs(row.last_ts)}</td>` +
        `<td>${row.last_success_ts != null ? wdFmtTs(row.last_success_ts) : '—'}</td>` +
        `<td>${esc(String(row.attempts))} / ${esc(String(row.successes))}</td>` +
        `<td style="white-space:pre-wrap;word-break:break-all;">${esc(ips)}</td>`;
      ruser.appendChild(tr);
    });
    userBody.innerHTML = '';
    userBody.appendChild(ruser);
    if ((data.byUser || []).length === 0) userBody.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>';
  } catch (e) {
    ipBody.innerHTML = '<tr><td colspan="5">加载失败: ' + esc(e.message) + '</td></tr>';
    userBody.innerHTML = '<tr><td colspan="5">加载失败: ' + esc(e.message) + '</td></tr>';
  }
}

async function loadWebdataAppLogs() {
  const lim = document.getElementById('wd-dblog-limit').value;
  const body = document.getElementById('wd-body-dblog');
  body.innerHTML = '<tr><td colspan="5">加载中…</td></tr>';
  try {
    const r = await fetch('/api/webdata-app-logs?limit=' + encodeURIComponent(lim), { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (data.ok === false) throw new Error(data.error || '请求失败');
    const frag = document.createDocumentFragment();
    (data.items || []).forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML =
        `<td>${esc(String(row.id))}</td>` +
        `<td>${wdFmtTs(row.ts)}</td>` +
        `<td>${esc(row.level)}</td>` +
        `<td>${esc(String(row.pid))}</td>` +
        `<td style="white-space:pre-wrap;word-break:break-all;">${esc(row.message)}</td>`;
      frag.appendChild(tr);
    });
    body.innerHTML = '';
    body.appendChild(frag);
    if ((data.items || []).length === 0) body.innerHTML = '<tr><td colspan="5">暂无数据（或未启用 SQLITE / 尚未写入）</td></tr>';
  } catch (e) {
    body.innerHTML = '<tr><td colspan="5">加载失败: ' + esc(e.message) + '</td></tr>';
  }
}

// 滚动到底部时锁定自动滚动，向上滚动时解锁
document.getElementById('log-wrap').addEventListener('scroll', function () {
  const atBottom = this.scrollHeight - this.scrollTop - this.clientHeight < 40;
  autoScroll = atBottom;
});

/* ================================================================
   本地文件上传 & 拖拽
   ================================================================ */
const FILE_INPUT   = document.getElementById('file-upload');
const DROP_OVERLAY = document.getElementById('drop-overlay');

function loadLocalFile(file) {
  if (!file) return;
  // 本地文件无需定时刷新
  stopTimer();
  BTN_AUTO.classList.remove('active');
  BTN_AUTO.textContent = '自动刷新: 关';

  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    allLines = text.split('\n').filter(l => l.trim()).map(parseLine);
    renderLog();
    setBadge(`本地: ${file.name}  ${allLines.length} 行`, false);
    // 在下拉框显示本地文件名（置顶）
    let localOpt = document.getElementById('opt-local');
    if (!localOpt) {
      localOpt = document.createElement('option');
      localOpt.id = 'opt-local';
      FILE_SELECT.insertBefore(localOpt, FILE_SELECT.firstChild);
    }
    localOpt.value = '';
    localOpt.textContent = `[本地] ${file.name}`;
    FILE_SELECT.value = '';
  };
  reader.onerror = () => setBadge('文件读取失败', true);
  reader.readAsText(file, 'utf-8');
}

FILE_INPUT.addEventListener('change', () => {
  loadLocalFile(FILE_INPUT.files[0]);
  FILE_INPUT.value = ''; // 允许重复选同一文件
});

// 拖拽到页面任意位置
let dragCounter = 0;
document.addEventListener('dragenter', e => {
  if (e.dataTransfer.types.includes('Files')) {
    dragCounter++;
    DROP_OVERLAY.classList.add('show');
  }
});
document.addEventListener('dragleave', () => {
  dragCounter--;
  if (dragCounter <= 0) { dragCounter = 0; DROP_OVERLAY.classList.remove('show'); }
});
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  dragCounter = 0;
  DROP_OVERLAY.classList.remove('show');
  const file = e.dataTransfer.files[0];
  if (file) loadLocalFile(file);
});

/* ================================================================
   初始化
   ================================================================ */
probeLogs();
startTimer();
</script>
