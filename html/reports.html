<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>已存档报告</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;padding:24px 20px 40px}
header{max-width:960px;margin:0 auto 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:1.1rem;font-weight:600;color:#f0f6fc}
.back-link{font-size:.75rem;color:#8b949e;text-decoration:none;border:1px solid #30363d;border-radius:6px;padding:5px 12px}
.back-link:hover{color:#58a6ff;border-color:#58a6ff}
.header-right{margin-left:auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
#status{font-size:.72rem;color:#8b949e}
#status.err{color:#f85149}
#status.ok{color:#3fb950}
.batch-toolbar{
  max-width:960px;margin:0 auto 16px;padding:12px 14px;background:#161b22;border:1px solid #21262d;border-radius:10px;
  display:flex;align-items:center;flex-wrap:wrap;gap:10px 16px;font-size:.78rem;color:#8b949e
}
.batch-toolbar label.rpt-lbl{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.batch-toolbar input[type=checkbox]{accent-color:#58a6ff}
.batch-toolbar .btn-bar{
  background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:.75rem;padding:5px 12px;cursor:pointer
}
.batch-toolbar .btn-bar:hover{border-color:#58a6ff;color:#58a6ff}
.batch-toolbar .btn-bar:disabled{opacity:.45;cursor:not-allowed}
.batch-toolbar .btn-del-sel{background:#2d1418;border-color:#f8514960;color:#f85149}
.batch-toolbar .btn-del-sel:hover:not(:disabled){border-color:#f85149;color:#ff7b72}
.batch-hint{flex:1;min-width:200px;font-size:.68rem;line-height:1.45}
main{max-width:960px;margin:0 auto}
.btn-refresh{background:#21262d;border:1px solid #30363d;border-radius:6px;color:#8b949e;font-size:.75rem;padding:5px 12px;cursor:pointer;margin-left:8px}
.btn-refresh:hover{border-color:#58a6ff;color:#58a6ff}
.filters{display:flex;align-items:center;gap:12px 18px;flex-wrap:wrap;font-size:.75rem;color:#8b949e}
.filters .fv{display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
.filters label{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.filters input{accent-color:#58a6ff}
.filters select{background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:.75rem;padding:5px 10px;cursor:pointer;max-width:200px}
.filters select:hover,.filters select:focus{border-color:#58a6ff;outline:none}
.month-block{background:#161b22;border:1px solid #21262d;border-radius:10px;margin-bottom:16px;overflow:hidden}
.month-hd{
  font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:#58a6ff;font-weight:600;padding:10px 14px;background:#1c2128;border-bottom:1px solid #21262d;
  display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px 14px
}
.month-hd-title{flex:1;min-width:140px;line-height:1.35}
.month-hd-actions{display:flex;align-items:center;flex-wrap:wrap;gap:6px 8px;flex-shrink:0}
.month-hd-actions .btn-grp{
  background:#21262d;border:1px solid #30363d;border-radius:6px;color:#8b949e;font-size:.62rem;padding:4px 8px;cursor:pointer;text-transform:none;letter-spacing:0;font-weight:600
}
.month-hd-actions .btn-grp:hover{border-color:#58a6ff;color:#58a6ff}
.month-hd-actions .btn-grp-json{color:#79c0ff}
.month-hd-actions .grp-up-html,.month-hd-actions .grp-up-json{display:none!important}
.month-hd .rpt-grp-sel{font-size:.62rem;text-transform:none;letter-spacing:0;color:#8b949e;font-weight:500;display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.month-hd .rpt-grp-sel input{accent-color:#58a6ff}
.file-list{list-style:none}
.file-list li{border-bottom:1px solid #21262d;display:flex;align-items:stretch;gap:0}
.file-list li:last-child{border-bottom:none}
.rpt-chk-cell{flex-shrink:0;display:flex;align-items:center;padding:0 6px 0 12px;border-right:1px solid #21262d}
.rpt-chk-cell input{width:16px;height:16px;cursor:pointer;accent-color:#58a6ff}
.file-list a{display:flex;align-items:center;gap:12px;padding:10px 16px;text-decoration:none;color:#c9d1d9;font-size:.82rem;transition:background .12s;flex:1;min-width:0}
.file-list a:hover{background:#21262d;color:#58a6ff}
.fname{flex:1;font-family:ui-monospace,Consolas,monospace;font-size:.78rem;word-break:break-all}
.fmeta{font-size:.68rem;color:#8b949e;white-space:nowrap;flex-shrink:0}
.kind-tag{font-size:.62rem;color:#58a6ff;opacity:.85;margin-right:6px}
.empty{padding:40px 20px;text-align:center;color:#8b949e;font-size:.88rem}
.empty code{color:#58a6ff;font-size:.75rem}
</style>
</head>
<body>
<header>
  <a class="back-link" href="index.html">← 返回首页</a>
  <h1>已存档报告（HTML / JSON）</h1>
  <button type="button" class="btn-refresh" id="btn-refresh" title="重新加载列表">↻ 刷新</button>
  <div class="header-right">
    <div class="filters" id="filters">
      <span class="fv"><span>类型</span>
        <select id="filter-kind" title="按扩展名筛选列表">
          <option value="all" selected>全部（HTML + JSON）</option>
          <option value="html">仅 HTML</option>
          <option value="json">仅 JSON</option>
        </select>
      </span>
      <span class="fv"><span>排序</span>
        <select id="sort-by" title="每组内文件顺序">
          <option value="mtime" selected>按修改时间（新→旧）</option>
          <option value="name">按文件名（A→Z）</option>
        </select>
      </span>
    </div>
    <span id="status"></span>
  </div>
</header>
<div class="batch-toolbar" id="batch-toolbar">
  <label class="rpt-lbl"><input type="checkbox" id="chk-all-visible"> 全选当前列表</label>
  <button type="button" class="btn-bar" id="btn-clear-sel">取消全选</button>
  <button type="button" class="btn-bar btn-del-sel" id="btn-del-selected" disabled>删除所选 <span id="sel-count">(0)</span></button>
  <p class="batch-hint">批量删除：勾选行后点「删除所选」。上传到某组目录请使用该组右上角的「上传 HTML / 上传 JSON」。</p>
</div>
<main id="main">
  <div class="empty" id="loading">正在加载…</div>
</main>
<script>
function fmtSize(n) {
  if (n >= 1048576) return (n / 1048576).toFixed(1) + ' MB';
  if (n >= 1024) return (n / 1024).toFixed(1) + ' KB';
  return n + ' B';
}
function fmtTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts * 1000);
  return d.toLocaleString('zh-CN', { hour12: false });
}
function esc(s) {
  const t = document.createElement('div');
  t.textContent = s;
  return t.innerHTML;
}
function reportHref(legacy, user, ym, name) {
  if (legacy)
    return '/report/' + encodeURIComponent(ym) + '/' + encodeURIComponent(name);
  return '/report/' + encodeURIComponent(user) + '/' + encodeURIComponent(ym) + '/' + encodeURIComponent(name);
}
function groupTitle(g) {
  const ym = g.ym || '';
  if (g.legacy) return ym + ' · 旧路径（无用户目录）';
  return (g.user || '—') + ' / ' + ym;
}
function kindPassesFilter(kind) {
  const mode = (document.getElementById('filter-kind') || {}).value || 'all';
  const k = (kind || 'html').toLowerCase();
  if (mode === 'json') return k === 'json';
  if (mode === 'html') return k !== 'json';
  return true;
}
function cmpReportName(a, b) {
  const sa = String(a || '');
  const sb = String(b || '');
  try {
    return sa.localeCompare(sb, 'zh-CN', { sensitivity: 'base', numeric: true });
  } catch (e) {
    return sa.localeCompare(sb);
  }
}
function sortFilesInPlace(files) {
  const sortBy = (document.getElementById('sort-by') || {}).value || 'mtime';
  files.sort(function (a, b) {
    if (sortBy === 'name') {
      return cmpReportName(a.name, b.name);
    }
    var ma = Number(a.mtime) || 0;
    var mb = Number(b.mtime) || 0;
    return mb - ma;
  });
  return files;
}
let reportsCache = null;
function attrEnc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}
function updateSelectionUi() {
  const boxes = document.querySelectorAll('#main .rpt-chk');
  const checked = document.querySelectorAll('#main .rpt-chk:checked');
  const n = checked.length;
  const allChk = document.getElementById('chk-all-visible');
  const btnDel = document.getElementById('btn-del-selected');
  const cnt = document.getElementById('sel-count');
  if (cnt) cnt.textContent = '(' + n + ')';
  if (btnDel) btnDel.disabled = n === 0;
  if (allChk && boxes.length) {
    allChk.checked = n === boxes.length && n > 0;
    allChk.indeterminate = n > 0 && n < boxes.length;
  } else if (allChk) {
    allChk.checked = false;
    allChk.indeterminate = false;
  }
  document.querySelectorAll('.rpt-grp-all').forEach(function (gch) {
    const sec = gch.closest('.month-block');
    if (!sec) return;
    const grp = sec.querySelectorAll('.rpt-chk');
    const gc = sec.querySelectorAll('.rpt-chk:checked');
    if (!grp.length) return;
    gch.checked = gc.length === grp.length;
    gch.indeterminate = gc.length > 0 && gc.length < grp.length;
  });
}
function renderReportsFromCache() {
  const main = document.getElementById('main');
  const st = document.getElementById('status');
  const data = reportsCache;
  if (!data) return;
  const groups = data.groups || [];
  let n = 0;
  let html = '';
  for (const g of groups) {
    const files = sortFilesInPlace((g.files || []).filter(function (f) { return kindPassesFilter(f.kind); }));
    if (!files.length) continue;
    n += files.length;
    const user = g.user || '';
    const ym = g.ym || '';
    const dLegacy = g.legacy ? '1' : '0';
    html += '<section class="month-block" data-legacy="' + dLegacy + '" data-user="' + attrEnc(user) + '" data-ym="' + attrEnc(ym) + '">' +
      '<div class="month-hd">' +
      '<span class="month-hd-title">' + esc(groupTitle(g)) + ' · ' + files.length + ' 个文件</span>' +
      '<div class="month-hd-actions">' +
      '<input type="file" class="grp-up-html" accept=".html,.htm,text/html">' +
      '<button type="button" class="btn-grp btn-grp-html" title="上传 .html 到此分组目录">上传 HTML</button>' +
      '<input type="file" class="grp-up-json" accept=".json,application/json">' +
      '<button type="button" class="btn-grp btn-grp-json" title="上传 .json 到此分组目录">上传 JSON</button>' +
      '<label class="rpt-grp-sel"><input type="checkbox" class="rpt-grp-all"> 全选本组</label>' +
      '</div></div><ul class="file-list">';
    for (const f of files) {
      const name = f.name || '';
      const href = reportHref(!!g.legacy, user, ym, name);
      const kind = (f.kind || 'html').toLowerCase();
      const kindLabel = kind === 'json' ? 'JSON' : 'HTML';
      html += '<li><span class="rpt-chk-cell"><input type="checkbox" class="rpt-chk" data-legacy="' + dLegacy + '" data-user="' + attrEnc(user) + '" data-ym="' + attrEnc(ym) + '" data-name="' + attrEnc(name) + '"></span>' +
        '<a target="_blank" rel="noopener" href="' + esc(href) + '">' +
        '<span class="kind-tag">' + esc(kindLabel) + '</span>' +
        '<span class="fname">' + esc(name) + '</span>' +
        '<span class="fmeta">' + fmtSize(f.size || 0) + ' · ' + fmtTime(f.mtime) + '</span></a></li>';
    }
    html += '</ul></section>';
  }
  if (!html) {
    const totalFiles = groups.reduce(function (acc, g) { return acc + (g.files || []).length; }, 0);
    if (totalFiles === 0) {
      main.innerHTML = '<div class="empty">暂无存档报告。<br><br>在 <a href="/linux_cmd_test.html" style="color:#58a6ff">Linux 命令行测试</a> 执行后使用「💾 存档」保存到 <code>html/report/&lt;SSH用户名&gt;/年月/</code></div>';
      st.textContent = '0 个分组';
    } else {
      main.innerHTML = '<div class="empty">当前筛选下没有可显示的文件。请将「类型」改为「全部」或切换为另一种扩展名。</div>';
      st.textContent = groups.length + ' 个分组 · 筛选后 0 条';
    }
  } else {
    main.innerHTML = html;
    st.textContent = groups.length + ' 个分组 · 显示 ' + n + ' 个文件';
  }
  st.className = 'ok';
  updateSelectionUi();
}
function getSelectedItems() {
  const out = [];
  document.querySelectorAll('#main .rpt-chk:checked').forEach(function (cb) {
    out.push({
      legacy: cb.getAttribute('data-legacy') === '1',
      user: cb.getAttribute('data-user') || '',
      ym: cb.getAttribute('data-ym') || '',
      name: cb.getAttribute('data-name') || ''
    });
  });
  return out;
}
async function deleteReport(legacy, user, ym, name) {
  const body = JSON.stringify({
    legacy: !!legacy,
    user: user || '',
    ym: ym || '',
    name: name
  });
  const resp = await fetch('/api/delete-report', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: body
  });
  let j = {};
  try { j = await resp.json(); } catch (e) { /* ignore */ }
  if (!resp.ok || !j.ok) {
    return { ok: false, error: j.error || ('HTTP ' + resp.status), name: name };
  }
  return { ok: true, name: name };
}
async function deleteSelectedBatch() {
  const items = getSelectedItems();
  if (!items.length) return;
  if (!confirm('确定删除选中的 ' + items.length + ' 个文件？此操作不可恢复。')) return;
  const fail = [];
  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    const r = await deleteReport(it.legacy, it.user, it.ym, it.name);
    if (!r.ok) fail.push((it.name || '?') + ': ' + (r.error || '失败'));
  }
  if (fail.length) {
    alert('部分删除失败（' + fail.length + '/' + items.length + '）：\n' + fail.slice(0, 8).join('\n') + (fail.length > 8 ? '\n…' : ''));
  }
  loadReports();
}
async function uploadReportToGroup(section, file, kind) {
  if (!section || !file) return;
  const legacy = section.getAttribute('data-legacy') === '1';
  const user = section.getAttribute('data-user') || '';
  const ym = section.getAttribute('data-ym') || '';
  if (!ym || ym.length !== 6) {
    alert('分组年月无效，无法上传。');
    return;
  }
  var buf;
  try {
    buf = await file.arrayBuffer();
  } catch (e) {
    alert('读取文件失败');
    return;
  }
  var headers = {
    'Content-Type': 'application/octet-stream',
    'X-Report-Filename': encodeURIComponent(file.name),
    'X-Report-YYYYMM': ym,
    'X-Report-Legacy': legacy ? '1' : '0'
  };
  if (!legacy) headers['X-Report-User'] = user || 'root';
  if (kind === 'json') headers['X-Report-Kind'] = 'json';
  var resp;
  try {
    resp = await fetch('/api/save-report', { method: 'POST', headers: headers, body: buf });
  } catch (e) {
    alert('上传请求失败：' + (e.message || String(e)));
    return;
  }
  var j = {};
  try { j = await resp.json(); } catch (e) { /* ignore */ }
  if (!resp.ok || !j.ok) {
    alert(j.error || ('上传失败 HTTP ' + resp.status));
    return;
  }
  alert('已上传到本组：' + (j.path || '成功'));
  loadReports();
}
async function loadReports() {
  const main = document.getElementById('main');
  const st = document.getElementById('status');
  st.textContent = '';
  st.className = '';
  main.innerHTML = '<div class="empty" id="loading">正在加载…</div>';
  updateSelectionUi();
  try {
    const resp = await fetch('/api/reports');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const groups = data.groups || [];
    reportsCache = data;
    if (!groups.length) {
      main.innerHTML = '<div class="empty">暂无存档报告。<br><br>在 <a href="/linux_cmd_test.html" style="color:#58a6ff">Linux 命令行测试</a> 执行后使用「💾 存档」保存到 <code>html/report/&lt;SSH用户名&gt;/年月/</code></div>';
      st.textContent = '0 个分组';
      st.className = 'ok';
      updateSelectionUi();
      return;
    }
    try {
      renderReportsFromCache();
    } catch (err) {
      reportsCache = null;
      main.innerHTML = '<div class="empty err">渲染列表失败：' + esc(err.message || String(err)) + '</div>';
      st.textContent = '渲染失败';
      st.className = 'err';
      updateSelectionUi();
    }
  } catch (e) {
    reportsCache = null;
    main.innerHTML = '<div class="empty err">加载失败：' + esc(e.message || String(e)) + '</div>';
    st.textContent = '加载失败';
    st.className = 'err';
    updateSelectionUi();
  }
}
document.getElementById('btn-refresh').addEventListener('click', loadReports);
document.getElementById('filter-kind').addEventListener('change', function () {
  if (reportsCache) renderReportsFromCache();
});
document.getElementById('sort-by').addEventListener('change', function () {
  if (reportsCache) renderReportsFromCache();
});
document.getElementById('chk-all-visible').addEventListener('change', function () {
  const on = this.checked;
  document.querySelectorAll('#main .rpt-chk').forEach(function (cb) { cb.checked = on; });
  updateSelectionUi();
});
document.getElementById('btn-clear-sel').addEventListener('click', function () {
  document.querySelectorAll('#main .rpt-chk').forEach(function (cb) { cb.checked = false; });
  document.getElementById('chk-all-visible').checked = false;
  updateSelectionUi();
});
document.getElementById('btn-del-selected').addEventListener('click', function () { deleteSelectedBatch(); });
document.getElementById('main').addEventListener('click', function (e) {
  var t = e.target;
  if (t.classList && t.classList.contains('btn-grp-html')) {
    var sec = t.closest('.month-block');
    if (!sec) return;
    var inp = sec.querySelector('.grp-up-html');
    if (inp) inp.click();
    return;
  }
  if (t.classList && t.classList.contains('btn-grp-json')) {
    var sec2 = t.closest('.month-block');
    if (!sec2) return;
    var inp2 = sec2.querySelector('.grp-up-json');
    if (inp2) inp2.click();
  }
});
document.getElementById('main').addEventListener('change', function (e) {
  const t = e.target;
  if (t.classList && t.classList.contains('grp-up-html')) {
    var f = t.files && t.files[0];
    t.value = '';
    if (f) uploadReportToGroup(t.closest('.month-block'), f, 'html');
    return;
  }
  if (t.classList && t.classList.contains('grp-up-json')) {
    var f2 = t.files && t.files[0];
    t.value = '';
    if (f2) uploadReportToGroup(t.closest('.month-block'), f2, 'json');
    return;
  }
  if (t.classList && t.classList.contains('rpt-chk')) {
    updateSelectionUi();
    return;
  }
  if (t.classList && t.classList.contains('rpt-grp-all')) {
    const sec = t.closest('.month-block');
    if (!sec) return;
    const on = t.checked;
    sec.querySelectorAll('.rpt-chk').forEach(function (cb) { cb.checked = on; });
    updateSelectionUi();
  }
});
loadReports();
</script>
</body>
</html>
