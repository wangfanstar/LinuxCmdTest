<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteWiki</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surf:#161b22;--surf2:#1e2740;
  --border:#30363d;--border2:#2d3a54;
  --text:#c9d1d9;--dim:#8b949e;
  --accent:#4a90e2;--green:#3fb950;--red:#f85149;--yellow:#d29922;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* topbar */
.topbar{height:50px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.topbar h1{font-size:.95rem;font-weight:700;color:#f0f6fc}
.topbar-sep{flex:1}
.topbar a{font-size:12px;color:var(--dim);text-decoration:none}
.topbar a:hover{color:var(--text)}

/* layout */
.wiki-layout{display:flex;flex:1;overflow:hidden;min-height:0}

/* sidebar */
.sidebar{width:240px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.sb-actions{display:flex;gap:6px;padding:10px;flex-shrink:0}
.sb-search{padding:0 10px 8px;flex-shrink:0}
.sb-search input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:.8rem;padding:5px 8px;outline:none}
.sb-search input:focus{border-color:var(--accent)}
.sb-tree{flex:1;overflow-y:auto;padding:4px 0}

/* tree nodes */
.tree-cat{display:flex;align-items:center;gap:4px;padding:5px 10px;font-size:.78rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;cursor:pointer;user-select:none}
.tree-cat:hover{color:var(--text)}
.tree-cat-name{flex:1}
.tree-cat-arrow{transition:transform .15s}
.tree-cat-arrow.open{transform:rotate(90deg)}
.tree-cat.active-cat{color:var(--accent)}
.tree-art{display:flex;align-items:center;gap:5px;padding:5px 10px 5px 22px;font-size:.82rem;color:var(--text);cursor:pointer;border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-art:hover{background:rgba(255,255,255,.03)}
.tree-art.active{background:rgba(74,144,226,.1);border-left-color:var(--accent);color:#f0f6fc}
.tree-art-icon{flex-shrink:0;font-size:.85rem}
.tree-art-title{overflow:hidden;text-overflow:ellipsis;min-width:0}

/* buttons */
.btn{padding:5px 12px;border:none;border-radius:5px;font-size:.78rem;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.45;cursor:default;filter:saturate(.35)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:#27334d;color:var(--text);border:1px solid var(--border2)}
.btn-danger{background:#3a1a1a;color:var(--red);border:1px solid #5a2a2a}
.btn-success{background:#1a3a2a;color:#3fb950;border:1px solid #2a5a3a}
.btn-sm{padding:4px 9px;font-size:.74rem}

/* main content */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* welcome */
#pane-welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--dim);gap:12px}
#pane-welcome .wlc-title{font-size:1.1rem;color:var(--text)}
#pane-welcome .wlc-sub{font-size:.82rem}

/* view pane */
#pane-view{flex:1;display:none;flex-direction:column;overflow:hidden}
.view-head{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.view-head>.btn,.view-head>a.btn{flex-shrink:0}
.view-breadcrumb{font-size:.78rem;color:var(--dim);flex:1 1 200px;min-width:0}
.view-breadcrumb span{color:var(--text)}
.view-body{flex:1;overflow-y:auto;padding:28px 32px}
.view-body h1.art-title{font-size:1.55rem;color:#f0f6fc;margin-bottom:6px}
.view-meta{font-size:.72rem;color:var(--dim);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
/* article content styles */
.art-content h1,.art-content h2,.art-content h3,.art-content h4,.art-content h5,.art-content h6{margin:1.3em 0 .5em;line-height:1.35}
.art-content h1{font-size:1.4rem;color:#79c0ff}
.art-content h2{font-size:1.2rem;color:#7ee787}
.art-content h3{font-size:1.05rem;color:#ffa657}
.art-content h4{color:#ff7b72}
.art-content h5,.art-content h6{color:#d2a8ff}
.art-content p{margin:.7em 0;line-height:1.75}
.code-block{position:relative;margin:1em 0}
.code-block pre{margin:0}
.copy-btn{position:absolute;top:7px;right:9px;padding:2px 9px;font-size:.7rem;line-height:1.5;background:#1e2740;color:#8b949e;border:1px solid var(--border);border-radius:4px;cursor:pointer;opacity:0;transition:opacity .15s,color .15s,border-color .15s;z-index:2;white-space:nowrap}
.code-block:hover .copy-btn{opacity:1}
.copy-btn:hover{color:var(--text);border-color:var(--border2)}
.copy-btn.copied{color:var(--green);border-color:#2a5a3a;opacity:1}
.art-content pre{background:#0d1117;border:1px solid var(--border);border-left:3px solid #3f6fb2;border-radius:6px;padding:14px;overflow-x:auto;margin:1em 0}
.art-content code{font-family:"SFMono-Regular",Consolas,monospace;font-size:.87em}
.art-content pre code{color:#c9d1d9}
.art-content :not(pre)>code{background:rgba(210,153,34,.14);padding:2px 7px;border-radius:4px;color:#ffa657;border:1px solid rgba(210,153,34,.38)}
.art-content strong{color:#f0f6fc;font-weight:700}
.art-content em{color:#c4d6ec;font-style:italic}
.art-content strong em,.art-content em strong{color:#ffdfa8}
.art-content blockquote{background:rgba(74,144,226,.08);border-left:4px solid var(--accent);padding:.55em 1em .55em 1.1em;color:#9fb0c3;margin:1em 0;border-radius:0 6px 6px 0}
.art-content ul li::marker{color:#e3b341}
.art-content ol li::marker{color:#79c0ff}
.art-content table{border-collapse:collapse;width:100%;margin:1em 0}
.art-content tbody tr:nth-child(even){background:rgba(110,118,129,.06)}
.art-content th,.art-content td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.art-content th{background:var(--surf);font-weight:600;color:#f0f6fc}
.art-content img{max-width:100%;border-radius:4px}
.art-content ul,.art-content ol{padding-left:1.6em;margin:.6em 0}
.art-content li{margin:.2em 0}
.art-content a{color:#58a6ff;text-decoration:none;border-bottom:1px solid rgba(88,166,255,.35)}
.art-content a:hover{color:#79c0ff;border-bottom-color:#79c0ff}
.art-content hr{border:none;border-top:1px solid var(--border);margin:1.4em 0;opacity:.9}
.art-content del{color:var(--dim);text-decoration:line-through}
.art-content{counter-reset:sc1 sc2 sc3 sc4}
.art-content h1{counter-reset:sc2 sc3 sc4;counter-increment:sc1}
.art-content h2{counter-reset:sc3 sc4;counter-increment:sc2}
.art-content h3{counter-reset:sc4;counter-increment:sc3}
.art-content h4{counter-increment:sc4}
.art-content h1::before{content:counter(sc1)". ";color:#8b949e;font-weight:400;font-size:.88em}
.art-content h2::before{content:counter(sc1)"."counter(sc2)" ";color:#8b949e;font-weight:400;font-size:.88em}
.art-content h3::before{content:counter(sc1)"."counter(sc2)"."counter(sc3)" ";color:#8b949e;font-weight:400;font-size:.88em}
.art-content h4::before{content:counter(sc1)"."counter(sc2)"."counter(sc3)"."counter(sc4)" ";color:#8b949e;font-weight:400;font-size:.88em}
.art-content .math-block{margin:1em 0;overflow-x:auto}
.art-content .mermaid-block{margin:1em 0;padding:10px 12px;border:1px solid var(--border);border-radius:6px;background:#101722;overflow:auto}
.art-content .mermaid{min-width:220px}
.art-content .footnotes{margin-top:1.6em;padding-top:.2em}
.art-content .footnotes hr{margin:.7em 0 1em}
.art-content .footnotes ol{padding-left:1.5em;margin:.2em 0}
.art-content .footnotes li{color:var(--dim);font-size:.9em;line-height:1.7;margin:.35em 0}
.art-content .fn-ref a{border-bottom:none;font-size:.8em;vertical-align:super}
.art-content .fn-backref{margin-left:.35em;border-bottom:none}

/* edit pane */
#pane-edit{flex:1;display:none;flex-direction:column;overflow:hidden}
.edit-top{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.edit-top input[type=text]{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:#f0f6fc;font-size:.88rem;padding:5px 9px;outline:none;min-width:200px;flex:1}
.edit-top input:focus{border-color:var(--accent)}
.edit-top select{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:.8rem;padding:5px 8px;outline:none}
.edit-top select:focus{border-color:var(--accent)}

/* toolbar */
.edit-toolbar{padding:5px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:2px;flex-shrink:0;flex-wrap:wrap}
.tb-btn{background:none;border:none;cursor:pointer;padding:3px 7px;border-radius:4px;font-size:.8rem;color:var(--dim);line-height:1.4}
.tb-btn:hover{background:rgba(255,255,255,.07);color:var(--text)}
.tb-btn:disabled{opacity:.3;cursor:default;pointer-events:none}
.tb-sep{width:1px;height:16px;background:var(--border);margin:0 3px}

/* editor split */
.edit-panels{flex:1;display:flex;overflow:hidden;min-height:0}
.edit-left{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--border)}
.editor-wrap{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column}
.editor-mirror{position:absolute;inset:0;padding:14px 16px;font-family:"Cascadia Mono","SFMono-Regular",Consolas,"Microsoft YaHei UI",monospace;font-size:.85rem;line-height:22px;tab-size:2;white-space:pre-wrap;word-break:break-word;pointer-events:none;overflow:hidden;background:transparent;z-index:1}
.editor-mirror *{pointer-events:none}
.editor-mirror .hl-h1{color:#79c0ff}
.editor-mirror .hl-h2{color:#7ee787}
.editor-mirror .hl-h3{color:#ffa657}
.editor-mirror .hl-h4{color:#ff7b72}
.editor-mirror .hl-h5,.editor-mirror .hl-h6{color:#d2a8ff}
.editor-mirror .hl-fence{color:#8b949e;background:rgba(110,118,129,.12)}
.editor-mirror .hl-codeblock{color:#c9d1d9;background:rgba(35,45,70,.26)}
.editor-mirror .hl-quote{color:#9fb0c3;background:rgba(74,144,226,.08)}
.editor-mirror .hl-list{color:#e3b341}
.editor-mirror .hl-hr{color:#6e7681}
.editor-mirror .hl-norm{color:#c9d1d9}
.editor-mirror .hl-inline-code{color:#ffb86b;background:rgba(210,153,34,.16)}
.editor-mirror .hl-strong{color:#f0f6fc}
.editor-mirror .hl-em{color:#c4d6ec}
.editor-mirror .hl-link{color:#79c0ff;text-decoration:underline}
.edit-left textarea{position:relative;z-index:0;flex:1;background:#0a0e14;color:transparent;caret-color:#c9d1d9;border:none;outline:none;resize:none;padding:14px 16px;font-family:"Cascadia Mono","SFMono-Regular",Consolas,"Microsoft YaHei UI",monospace;font-size:.85rem;line-height:22px;tab-size:2}
.edit-right{flex:1;overflow-y:auto;padding:16px 20px;min-width:0}
.edit-right.hidden{display:none}
.edit-left.full{flex:2}
.panel-label{padding:4px 12px;font-size:.7rem;color:var(--dim);border-bottom:1px solid var(--border);background:var(--surf);flex-shrink:0}

/* view toggle */
.view-toggle{display:flex;gap:2px;margin-left:auto}
.vt-btn{background:none;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:3px 8px;font-size:.74rem;color:var(--dim)}
.vt-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* status */
.statusbar{height:26px;background:var(--surf);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;font-size:.72rem;color:var(--dim);flex-shrink:0;gap:12px}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surf2);border:1px solid var(--border2);border-radius:10px;width:340px;max-width:92vw;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.modal-head{padding:13px 16px 9px;border-bottom:1px solid var(--border2);font-weight:600;font-size:.88rem;color:#f0f6fc;display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:14px 16px}
.modal-foot{padding:10px 16px 13px;border-top:1px solid var(--border2);display:flex;gap:8px;justify-content:flex-end}
.modal-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:1.1rem;line-height:1}
.field-label{font-size:.75rem;color:var(--dim);margin-bottom:4px;display:block}
.field-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-size:.82rem;padding:6px 8px;outline:none;margin-bottom:10px}
.field-input:focus{border-color:var(--accent)}

/* context menu */
.ctx-menu{position:fixed;z-index:9999;background:var(--surf2);border:1px solid var(--border2);border-radius:6px;padding:4px 0;min-width:130px;box-shadow:0 6px 20px rgba(0,0,0,.55);display:none}
.ctx-menu.open{display:block}
.ctx-item{padding:6px 14px;font-size:.8rem;color:var(--text);cursor:pointer;white-space:nowrap;user-select:none}
.ctx-item:hover{background:rgba(255,255,255,.07)}
.ctx-item.danger{color:var(--red)}
.ctx-sep{height:1px;background:var(--border);margin:3px 0}
</style>
</head>
<body>

<div class="topbar">
  <h1>📝 NoteWiki</h1>
  <div class="topbar-sep"></div>
  <a href="/notewikiindex.html">📑 文章索引</a>
  <a href="/index.html">← 返回首页</a>
</div>

<div class="wiki-layout">
  <!-- sidebar -->
  <div class="sidebar">
    <div class="sb-actions">
      <button class="btn btn-primary btn-sm" onclick="newArticle()">✚ 新建</button>
      <button class="btn btn-secondary btn-sm" onclick="openNewCatModal()">📁 分类</button>
      <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="refreshAll()" title="刷新">↺</button>
      <button class="btn btn-secondary btn-sm" onclick="rebuildAllHtml()" title="一键更新所有文章的HTML">🔄</button>
      <button class="btn btn-danger btn-sm" onclick="cleanupUploads()" title="删除 uploads 中未被引用的图片">🗑</button>
    </div>
    <div class="sb-search">
      <input id="sb-search" type="text" placeholder="搜索文章…" oninput="onSearchInput()">
      <div id="sb-search-hint" style="font-size:.72rem;color:var(--dim);padding:2px 2px 0;display:none"></div>
    </div>
    <div class="sb-tree" id="sb-tree"></div>
  </div>

  <!-- main -->
  <div class="main-area">
    <!-- welcome -->
    <div id="pane-welcome" style="display:flex">
      <div class="wlc-title">📝 NoteWiki</div>
      <div class="wlc-sub">选择左侧文章，或点击「✚ 新建」创建第一篇笔记</div>
    </div>

    <!-- view -->
    <div id="pane-view" style="display:none;flex:1;flex-direction:column;overflow:hidden">
      <div class="view-head">
        <div class="view-breadcrumb" id="view-breadcrumb"></div>
        <button class="btn btn-secondary btn-sm" onclick="editCurrent()">✏ 编辑</button>
        <button class="btn btn-secondary btn-sm" onclick="exportMdZip()" title="导出 MD + 图片 ZIP">⬇ MD</button>
        <button class="btn btn-secondary btn-sm" onclick="exportPdf()" title="打印/导出 PDF">🖨 PDF</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCurrent()">🗑 删除</button>
        <a class="btn btn-secondary btn-sm" id="view-html-link" href="#" target="_blank">🔗 HTML</a>
      </div>
      <div class="view-body">
        <h1 class="art-title" id="view-title"></h1>
        <div class="view-meta" id="view-meta"></div>
        <div class="art-content" id="view-content"></div>
      </div>
    </div>

    <!-- edit -->
    <div id="pane-edit" style="display:none;flex:1;flex-direction:column;overflow:hidden">
      <div class="edit-top">
        <input type="text" id="edit-title" placeholder="文章标题…" spellcheck="false" oninput="scheduleAutoSave()">
        <input type="text" id="edit-filename" placeholder="链接文件名（a-z 0-9 _ -）" title="保存为 .md/.html 的文件名，留空自动生成" spellcheck="false" style="display:none;max-width:200px">
        <select id="edit-category"><option value="">📁 根目录</option></select>
        <div class="view-toggle">
          <button class="vt-btn on" id="vt-split" onclick="setViewMode('split')" title="分屏">⊞</button>
          <button class="vt-btn"    id="vt-edit"  onclick="setViewMode('edit')"  title="仅编辑">✎</button>
          <button class="vt-btn"    id="vt-prev"  onclick="setViewMode('prev')"  title="仅预览">👁</button>
          <button class="vt-btn"    id="btn-preview-align" onclick="togglePreviewAlign()" title="默认关闭：开启后右侧预览随光标所在行自动滚动对齐">↕</button>
        </div>
        <span id="autosave-label" style="font-size:.72rem;color:var(--dim);white-space:nowrap"></span>
        <button class="btn btn-primary btn-sm" id="btn-save" onclick="saveArticle()" disabled>💾 保存</button>
        <button class="btn btn-success btn-sm" onclick="publishArticle()" title="保存并生成已发布页面（不离开当前页）">📤 发布</button>
        <button class="btn btn-secondary btn-sm" onclick="exportPdf()" title="打印/导出 PDF（阅读态用已打开正文，编辑态用当前草稿）">🖨 PDF</button>
        <a class="btn btn-secondary btn-sm" id="edit-html-link" href="#" target="_blank" rel="noopener noreferrer" title="已发布 HTML 页面">🔗 HTML</a>
        <button class="btn btn-secondary btn-sm" onclick="cancelEdit()">✕</button>
      </div>
      <div class="edit-toolbar" id="edit-toolbar">
        <button class="tb-btn" id="tb-undo" onclick="doUndo()" title="撤消 Ctrl+Z" disabled>↩</button>
        <button class="tb-btn" id="tb-redo" onclick="doRedo()" title="恢复 Ctrl+Y" disabled>↪</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="tb('h1')" title="H1"><b>H1</b></button>
        <button class="tb-btn" onclick="tb('h2')" title="H2"><b>H2</b></button>
        <button class="tb-btn" onclick="tb('h3')" title="H3"><b>H3</b></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="tb('bold')"   title="粗体"><b>B</b></button>
        <button class="tb-btn" onclick="tb('italic')" title="斜体"><i>I</i></button>
        <button class="tb-btn" onclick="tb('strike')" title="删除线"><s>S</s></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="tb('code')"      title="行内代码">`c`</button>
        <button class="tb-btn" onclick="tb('codeblock')" title="代码块">```</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="tb('quote')"  title="引用">❝</button>
        <button class="tb-btn" onclick="tb('ul')"     title="无序列表">• 列</button>
        <button class="tb-btn" onclick="tb('ol')"     title="有序列表">1. 列</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="openLinkModal()" title="插入链接">🔗</button>
        <button class="tb-btn" onclick="openImgUpload()" title="插入图片">🖼</button>
        <button class="tb-btn" onclick="openTableModal()" title="插入表格（Ctrl+Alt+T）">⊞</button>
        <button class="tb-btn" onclick="tb('hr')"     title="分割线">─</button>
      </div>
      <div class="edit-panels" id="edit-panels">
        <div class="edit-left" id="edit-left">
          <div class="panel-label">Markdown</div>
          <div class="editor-wrap">
            <div id="editor-mirror" class="editor-mirror" aria-hidden="true"></div>
            <textarea id="edit-textarea" spellcheck="false"
              oninput="onEditorInput()"
              onscroll="syncMirrorScroll()"
              onkeydown="onEditorKey(event)"
              onkeyup="schedulePreviewScrollSync()"
              onclick="schedulePreviewScrollSync()"
              onselect="schedulePreviewScrollSync()"
              ondrop="onEditorDrop(event)"
              ondragover="event.preventDefault()"
              onpaste="onEditorPaste(event)"></textarea>
          </div>
        </div>
        <div class="edit-right art-content" id="edit-right">
          <div class="panel-label" style="margin:-16px -20px 14px">预览</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="status-msg">就绪</span>
  <span id="status-count" style="margin-left:auto"></span>
</div>

<!-- 新建分类 modal -->
<div class="modal-overlay" id="modal-newcat">
  <div class="modal-box">
    <div class="modal-head">📁 新建分类<button class="modal-close" onclick="closeNewCatModal()">✕</button></div>
    <div class="modal-body">
      <label class="field-label">父分类（留空为根目录）</label>
      <select id="nc-parent" class="field-input"></select>

<script>
// ── State ────────────────────────────────────────────────────────────
var S = {
  articles: [],
  categories: [],
  curId: null,
  curCat: null,
  editId: null,
  editIsNew: false,
  editForce: false,       // 强制覆盖同名文件
  editForceCreated: '',   // 被覆盖文章原有 created 字段
  viewMode: 'split',      // split | edit | prev
  previewAlign: false     // 右侧预览是否随光标自动对齐（默认关闭）
};

// ── Init ─────────────────────────────────────────────────────────────
function init() {
  var params = new URLSearchParams(location.search);
  var editId = params.get('edit');
  refreshAll(function() {
    if (editId) {
      openArticle(editId);
      editCurrent();
    }
  });
}

function refreshAll(onDone) {
  setStatus('加载中…');
  fetch('/api/wiki-list')
    .then(function(r){
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data){
      S.articles = data.articles || [];
      S.categories = buildCats(S.articles);
      // 合并服务端返回的目录列表（包含空目录）
      (data.categories || []).forEach(function(c){
        if(c && S.categories.indexOf(c)===-1) S.categories.push(c);
      });
      S.categories.sort();
      renderTree();
      setStatus('共 ' + S.articles.length + ' 篇文章');
      document.getElementById('status-count').textContent = S.articles.length + ' 篇';
      if (onDone) onDone();
    })
    .catch(function(e){ setStatus('加载失败：'+e.message); renderTree(); });
}

function buildCats(arts) {
  var set = {'':true};
  arts.forEach(function(a){ if(a.category) set[a.category]=true; });
  return Object.keys(set).filter(Boolean).sort();
}

// ── Tree ─────────────────────────────────────────────────────────────
var treeExpanded = {};
var _searchTimer = null;
var _searchQ = '';
var _ftMatched = {}; // ids matched by full-text (not title/cat)

function onSearchInput() {
  var q = (document.getElementById('sb-search').value||'').toLowerCase().trim();
  if (q !== _searchQ) { _ftMatched = {}; }
  _searchQ = q;
  renderTree();
  if (_searchTimer) clearTimeout(_searchTimer);
  if (!q) {
    document.getElementById('sb-search-hint').style.display='none';
    return;
  }
  document.getElementById('sb-search-hint').textContent='搜索中…';
  document.getElementById('sb-search-hint').style.display='';
  _searchTimer = setTimeout(function(){
    var cur = q;
    fetch('/api/wiki-search?q='+encodeURIComponent(cur))
      .then(function(r){return r.json();})
      .then(function(data){
        if (_searchQ !== cur) return;
        if (!data.ok || !data.articles) return;
        var localIds = {};
        S.articles.forEach(function(a){
          if(a.title.toLowerCase().includes(cur)||(a.category||'').toLowerCase().includes(cur))
            localIds[a.id]=true;
        });
        var newFt = {};
        data.articles.forEach(function(a){ if (!localIds[a.id]) newFt[a.id]=a; });
        _ftMatched = newFt;
        var count = Object.keys(newFt).length;
        var hint = document.getElementById('sb-search-hint');
        hint.textContent = count ? '全文匹配 '+count+' 篇' : '无全文匹配';
        hint.style.display='';
        renderTree();
      }).catch(function(){
        document.getElementById('sb-search-hint').textContent='';
        document.getElementById('sb-search-hint').style.display='none';
      });
  }, 350);
}

function renderTree() {
  var q = _searchQ;
  var arts;
  if (!q) {
    arts = S.articles;
  } else {
    var localMatches = S.articles.filter(function(a){
      return a.title.toLowerCase().includes(q) || (a.category||'').toLowerCase().includes(q);
    });
    var ftExtra = Object.keys(_ftMatched).map(function(k){return _ftMatched[k];});
    arts = localMatches.concat(ftExtra);
  }

  var bycat = {};
  arts.forEach(function(a){
    var c = a.category||'';
    if(!bycat[c]) bycat[c]=[];
    bycat[c].push(a);
  });

  // include empty categories (e.g. just created, no articles yet)
  S.categories.forEach(function(c){ if(!(c in bycat)) bycat[c]=[]; });

  // sort each bucket by updated desc
  Object.keys(bycat).forEach(function(c){
    bycat[c].sort(function(a,b){ return (b.updated||'').localeCompare(a.updated||''); });
  });

  var html = '';

  // root articles first
  if (bycat[''] && bycat[''].length) {
    html += catSection('', bycat[''], true);
  }

  // categories (hierarchical)
  html += renderCatChildren(bycat, '', 0);

  document.getElementById('sb-tree').innerHTML = html || '<div style="padding:16px;font-size:.78rem;color:var(--dim)">暂无文章</div>';
}

// root-only flat section
function catSection(cat, arts, isRoot) {
  var key = cat||'__root__';
  var open = (treeExpanded[key] !== false);
  var h = '<div class="tree-cat'+(S.curCat===cat?' active-cat':'')+'" '
        + 'data-type="cat" data-cat="" '
        + 'onclick="toggleCat(\''+esc(key)+'\')">'
        + '<span class="tree-cat-arrow'+(open?' open':'')+'">▶</span>'
        + '📁 <span class="tree-cat-name">根目录</span>'
        + '<span style="font-size:.68rem;color:var(--dim);margin-left:4px">'+arts.length+'</span>'
        + '</div>';
  if (open) {
    arts.forEach(function(a){
      h += '<div class="tree-art'+(S.curId===a.id?' active':'')+'" '
         + 'data-type="art" data-id="'+escH(a.id)+'" '
         + 'onclick="openArticle(\''+esc(a.id)+'\')">'
         + '<span class="tree-art-icon">📄</span>'
         + '<span class="tree-art-title">'+escH(a.title||'(无标题)')+'</span>'
         + '</div>';
    });
  }
  return h;
}

// render direct children of parentPath at the given depth
function renderCatChildren(bycat, parentPath, depth) {
  var prefix = parentPath ? parentPath + '/' : '';
  var children = Object.keys(bycat).filter(Boolean).filter(function(c) {
    if (!c.startsWith(prefix)) return false;
    var rest = c.slice(prefix.length);
    return rest.length > 0 && rest.indexOf('/') === -1;
  }).sort();
  var h = '';
  children.forEach(function(cat) { h += catSectionTree(cat, bycat, depth); });
  return h;
}

// render one category node with its articles and sub-categories recursively
function catSectionTree(cat, bycat, depth) {
  var arts = bycat[cat] || [];
  var key = cat;
  var open = (treeExpanded[key] !== false);
  var label = cat.split('/').pop();
  var indent = depth * 14;
  var h = '<div class="tree-cat'+(S.curCat===cat?' active-cat':'')+'" '
        + 'data-type="cat" data-cat="'+escH(cat)+'" '
        + 'style="padding-left:'+(10+indent)+'px" '
        + 'onclick="toggleCat(\''+esc(key)+'\')">'
        + '<span class="tree-cat-arrow'+(open?' open':'')+'">▶</span>'
        + '📂 <span class="tree-cat-name">'+escH(label)+'</span>'
        + '<span style="font-size:.68rem;color:var(--dim);margin-left:4px">'+arts.length+'</span>'
        + '</div>';
  if (open) {
    arts.forEach(function(a){
      h += '<div class="tree-art'+(S.curId===a.id?' active':'')+'" '
         + 'data-type="art" data-id="'+escH(a.id)+'" '
         + 'style="padding-left:'+(22+indent)+'px" '
         + 'onclick="openArticle(\''+esc(a.id)+'\')">'
         + '<span class="tree-art-icon">📄</span>'
         + '<span class="tree-art-title">'+escH(a.title||'(无标题)')+'</span>'
         + '</div>';
    });
    h += renderCatChildren(bycat, cat, depth + 1);
  }
  return h;
}

function toggleCat(key) {
  treeExpanded[key] = (treeExpanded[key] === false) ? true : false;
  renderTree();
}

/** 与阅读页「HTML」链接一致的已发布路径（相对网站根路径） */
function publishedHtmlUrl(id, cat) {
  if (!id) return '';
  cat = cat || '';
  return cat ? '/wiki/' + cat + '/' + id + '.html' : '/wiki/' + id + '.html';
}

// ── Open / View ───────────────────────────────────────────────────────
function openArticle(id) {
  S.curId = id;
  renderTree();
  var meta = S.articles.find(function(a){return a.id===id;});
  if (!meta) return;

  showPane('view');
  document.getElementById('view-title').textContent = meta.title||'';
  document.getElementById('view-meta').textContent =
    '分类：'+(meta.category||'根目录') + '  |  更新：'+(meta.updated||'').replace('T',' ').replace('Z','');

  var cat = meta.category||'';
  document.getElementById('view-html-link').href = publishedHtmlUrl(id, cat);
  document.getElementById('view-breadcrumb').innerHTML =
    '<span>'+escH(cat||'根目录')+'</span> / '+escH(meta.title||'');

  document.getElementById('view-content').innerHTML = '<span style="color:var(--dim)">加载中…</span>';

  fetch('/api/wiki-read?id='+encodeURIComponent(id))
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.ok) {
        var vc = document.getElementById('view-content');
        vc.innerHTML = md2html(data.content||'');
        scheduleRichRender(vc);
      } else {
        document.getElementById('view-content').innerHTML = '<span style="color:var(--red)">读取失败</span>';
      }
    })
    .catch(function(){ document.getElementById('view-content').innerHTML='<span style="color:var(--red)">网络错误</span>'; });
}

// ── Edit ─────────────────────────────────────────────────────────────
function newArticle(prefillCat) {
  /* 填充分类下拉 */
  var sel = document.getElementById('na-category');
  sel.innerHTML = '<option value="">📁 根目录</option>';
  S.categories.forEach(function(c){
    var opt = document.createElement('option');
    opt.value = c; opt.textContent = '📂 '+c; sel.appendChild(opt);
  });
  sel.value = (prefillCat !== undefined ? prefillCat : (S.curCat || ''));
  /* 清空输入 */
  document.getElementById('na-title').value = '';
  document.getElementById('na-filename').value = '';
  document.getElementById('na-filename').removeAttribute('data-manual');
  hideTip();
  document.getElementById('modal-newarticle').classList.add('open');
  setTimeout(function(){ document.getElementById('na-title').focus(); }, 50);
}
function closeNewArticleModal(){ document.getElementById('modal-newarticle').classList.remove('open'); }

function onNATitleInput() {
  var inp = document.getElementById('na-filename');
  if (inp.getAttribute('data-manual')) return;
  inp.value = slugifyFilename(document.getElementById('na-title').value);
  validateNAFilename();
}
function onNAFilenameInput() {
  document.getElementById('na-filename').setAttribute('data-manual','1');
  validateNAFilename();
}
function hideTip(){
  document.getElementById('na-filename-tip').style.display='none';
  document.getElementById('na-force-wrap').style.display='none';
  document.getElementById('na-force').checked=false;
}
function showTip(msg, showForce){
  var t=document.getElementById('na-filename-tip');
  t.textContent=msg; t.style.display='block';
  document.getElementById('na-force-wrap').style.display = showForce ? '' : 'none';
  if (!showForce) document.getElementById('na-force').checked=false;
}
function validateNAFilename() {
  var fn = document.getElementById('na-filename').value.trim();
  if (!fn) { hideTip(); return true; }
  if (!/^[a-z0-9_-]+$/.test(fn)) { showTip('只能含小写字母、数字、_ 和 -', false); return false; }
  var dup = S.articles.find(function(a){ return a.id===fn; });
  if (dup) {
    showTip('文件名「'+fn+'」已存在（勾选后可强制覆盖）', true);
    return document.getElementById('na-force').checked;  /* 勾选后允许通过 */
  }
  hideTip(); return true;
}
function doNewArticle() {
  var title = document.getElementById('na-title').value.trim();
  if (!title) { document.getElementById('na-title').focus(); return; }
  if (!validateNAFilename()) { document.getElementById('na-filename').focus(); return; }
  var fn    = document.getElementById('na-filename').value.trim();
  var cat   = document.getElementById('na-category').value;
  var force = document.getElementById('na-force').checked;
  closeNewArticleModal();
  /* 强制覆盖时找到原文章的 created 字段 */
  S.editForce = force;
  S.editForceCreated = '';
  if (force && fn) {
    var old = S.articles.find(function(a){ return a.id===fn; });
    if (old) S.editForceCreated = old.created || '';
  }
  /* 进入编辑器 */
  S.editId = null;
  S.editIsNew = true;
  document.getElementById('edit-title').value = title;
  document.getElementById('edit-textarea').value = '';
  var fnEl = document.getElementById('edit-filename');
  fnEl.value = fn; fnEl.style.display = 'none';
  populateCatSelect(cat);
  showPane('edit');
  setViewMode(S.viewMode);
  updatePreview();
  updateEditorHighlight();
  histReset();
  markEditBaseline();
  setTimeout(function(){ document.getElementById('edit-textarea').focus(); }, 50);
}

function editCurrent() {
  if (!S.curId) return;
  var meta = S.articles.find(function(a){return a.id===S.curId;});
  if (!meta) return;
  S.editId = S.curId;
  S.editIsNew = false;
  _autoSaveDirty = false;
  updateAutoSaveLabel('');
  document.getElementById('edit-title').value = meta.title||'';
  document.getElementById('edit-filename').style.display = 'none';
  populateCatSelect(meta.category||'');
  showPane('edit');
  setViewMode(S.viewMode);
  document.getElementById('edit-textarea').value = '加载中…';

  fetch('/api/wiki-read?id='+encodeURIComponent(S.curId))
    .then(function(r){return r.json();})
    .then(function(data){
      document.getElementById('edit-textarea').value = data.ok ? (data.content||'') : '';
      updatePreview();
      updateEditorHighlight();
      histReset();
      markEditBaseline();
      updateEditHtmlLink();
      setTimeout(function(){ document.getElementById('edit-textarea').focus(); }, 50);
    });
}

function cancelEdit() {
  if (S.curId) showPane('view');
  else showPane('welcome');
}

function populateCatSelect(selected) {
  var sel = document.getElementById('edit-category');
  sel.innerHTML = '<option value="">📁 根目录</option>';
  S.categories.forEach(function(c){
    var opt = document.createElement('option');
    opt.value = c; opt.textContent = '📂 '+c;
    sel.appendChild(opt);
  });
  sel.value = selected||'';
  updateEditHtmlLink();
}

/** 编辑顶栏「HTML」按钮：已有 id 或新建时已填文件名时可用 */
function updateEditHtmlLink() {
  var a = document.getElementById('edit-html-link');
  if (!a) return;
  var cat = document.getElementById('edit-category').value || '';
  var id = S.editId;
  if (!id && S.editIsNew)
    id = (document.getElementById('edit-filename').value || '').trim();
  var url = publishedHtmlUrl(id, cat);
  if (!url) {
    a.href = '#';
    a.setAttribute('data-edit-html-disabled', '1');
    a.style.opacity = '0.45';
    a.style.pointerEvents = 'none';
    a.style.cursor = 'default';
    a.title = '保存文章后（或填写链接文件名）可打开已发布的 HTML';
    return;
  }
  a.href = url;
  a.removeAttribute('data-edit-html-disabled');
  a.style.opacity = '';
  a.style.pointerEvents = '';
  a.style.cursor = '';
  a.title = '新标签打开已发布页面：' + url;
}

// ── Save ─────────────────────────────────────────────────────────────
// ── Auto-save ────────────────────────────────────────────────────────
var _autoSaveTimer = null;
var _autoSaveDirty = false;
var _editBaseline = '';
var _editDirty = false;

function getEditDraftState() {
  var pane = document.getElementById('pane-edit');
  if (!pane || pane.style.display === 'none') return '';
  return JSON.stringify({
    id: S.editId || '',
    isNew: !!S.editIsNew,
    title: document.getElementById('edit-title').value || '',
    category: document.getElementById('edit-category').value || '',
    content: document.getElementById('edit-textarea').value || '',
    filename: document.getElementById('edit-filename').value || ''
  });
}

function setEditDirty(dirty) {
  _editDirty = !!dirty;
  var saveBtn = document.getElementById('btn-save');
  if (saveBtn) saveBtn.disabled = !_editDirty;
}

function markEditBaseline() {
  _editBaseline = getEditDraftState();
  setEditDirty(false);
}

function refreshEditDirtyState() {
  if (!_editBaseline) {
    setEditDirty(false);
    return;
  }
  setEditDirty(getEditDraftState() !== _editBaseline);
}

function scheduleAutoSave() {
  _autoSaveDirty = true;
  if (_autoSaveTimer) clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(function(){ doAutoSave(); }, 30000);
}

function doAutoSave() {
  if (!_autoSaveDirty) return;
  var title = document.getElementById('edit-title').value.trim();
  if (!title || !S.editId) return; // 仅已有 id 的文章自动保存
  _doSave({silent: true});
}

function updateAutoSaveLabel(msg) {
  var el = document.getElementById('autosave-label');
  if (el) el.textContent = msg || '';
}

// ── Save / Publish ────────────────────────────────────────────────────
function saveArticle()   { _doSave({}); }
function publishArticle(){ _doSave({ published: true }); }

function _doSave(opts) {
  opts = opts || {};
  var silent  = !!opts.silent;
  var published = !!opts.published;

  var title   = document.getElementById('edit-title').value.trim();
  var cat     = document.getElementById('edit-category').value;
  var content = document.getElementById('edit-textarea').value;

  if (!title) {
    if (!silent) { document.getElementById('edit-title').focus(); setStatus('请输入标题'); }
    return;
  }

  /* 新建时处理自定义文件名 */
  var useId = S.editId || '';
  var useForce = false;
  if (S.editIsNew) {
    var fn = document.getElementById('edit-filename').value.trim();
    if (fn) {
      if (!/^[a-z0-9_-]+$/.test(fn)) {
        if (!silent) { setStatus('文件名只能含小写字母、数字、_ 和 -'); document.getElementById('edit-filename').focus(); }
        return;
      }
      useId = fn;
      useForce = S.editForce;
    }
  }

  var html = md2html(content);
  var meta = S.editId ? S.articles.find(function(a){return a.id===S.editId;}) : null;
  var useCreated = meta ? (meta.created||'') : (S.editForceCreated||'');

  if (!silent) setStatus('保存中…');
  else updateAutoSaveLabel('保存中…');

  fetch('/api/wiki-save', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({id:useId, title:title, category:cat, content:content, html:html, created:useCreated, force:useForce})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if (data.ok) {
      S.curId  = data.id;
      S.editId = data.id;
      S.editIsNew = false;
      _autoSaveDirty = false;
      var now = new Date(); var hm = ('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
      if (silent) {
        updateAutoSaveLabel('自动保存 '+hm);
      } else {
        setStatus(published ? '已发布' : '已保存');
        updateAutoSaveLabel('保存于 '+hm);
      }
      markEditBaseline();
      refreshAll();
      updateEditHtmlLink();
      // 保存/发布后继续停留在当前编辑页，不打开新标签
    } else {
      if (!silent) setStatus('保存失败：'+(data.error||''));
      else updateAutoSaveLabel('保存失败');
    }
  })
  .catch(function(e){
    if (!silent) setStatus('请求失败：'+e.message);
    else updateAutoSaveLabel('保存失败');
  });
}

// ── Delete ───────────────────────────────────────────────────────────
function deleteCurrent() {
  if (!S.curId) return;
  var meta = S.articles.find(function(a){return a.id===S.curId;});
  var name = meta ? meta.title : S.curId;
  if (!confirm('确定删除「'+name+'」？')) return;
  setStatus('删除中…');
  fetch('/api/wiki-delete',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id:S.curId})})
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.ok){ S.curId=null; showPane('welcome'); refreshAll(); setStatus('已删除'); }
    else setStatus('删除失败：'+(data.error||''));
  })
  .catch(function(e){ setStatus('请求失败：'+e.message); });
}

function openNewCatModal(prefillParent) {
  var sel = document.getElementById('nc-parent');
  sel.innerHTML = '<option value="">根目录</option>';
  S.categories.forEach(function(c){
    var opt=document.createElement('option'); opt.value=c; opt.textContent=c; sel.appendChild(opt);
  });
  sel.value = prefillParent || '';
  document.getElementById('nc-name').value = '';
  document.getElementById('modal-newcat').classList.add('open');
  setTimeout(function(){ document.getElementById('nc-name').focus(); },50);
}
function closeNewCatModal(){ document.getElementById('modal-newcat').classList.remove('open'); }
function doCreateCat() {
  var parent = document.getElementById('nc-parent').value.trim();
  var name   = document.getElementById('nc-name').value.trim();
  if (!name) { document.getElementById('nc-name').focus(); return; }
  var path = parent ? parent+'/'+name : name;
  fetch('/api/wiki-mkdir',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({path:path})})
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.ok){
      setStatus('分类已创建');
      if(S.categories.indexOf(path)===-1){ S.categories.push(path); S.categories.sort(); }
      closeNewCatModal();
      renderTree();
    } else {
      setStatus('创建失败：'+(data.error||''));
    }
  });
}

// ── 链接文件名自动补全（新建时从标题生成） ────────────────────────────
function slugifyFilename(s) {
  return (s||'').toLowerCase().replace(/[^a-z0-9_-]/g,'_').replace(/_+/g,'_')
                .replace(/^_|_$/g,'').substring(0,80);
}
document.getElementById('edit-title').addEventListener('input', function(){
  if (S.editIsNew) {
    var fn = document.getElementById('edit-filename');
    if (!fn.dataset.manual) fn.value = slugifyFilename(this.value);
    updateEditHtmlLink();
  }
  refreshEditDirtyState();
});
document.getElementById('edit-filename').addEventListener('input', function(){
  this.dataset.manual = '1';
  refreshEditDirtyState();
  updateEditHtmlLink();
});
document.getElementById('edit-category').addEventListener('change', function(){
  refreshEditDirtyState();
  updateEditHtmlLink();
});

document.getElementById('edit-html-link').addEventListener('click', function(e) {

});

var ctxTarget = null;

document.getElementById('sb-tree').addEventListener('contextmenu', function(e){
  var artEl = e.target.closest('[data-type="art"]');
  var catEl = e.target.closest('[data-type="cat"]');
  if (artEl) {
    e.preventDefault();
    var id = artEl.getAttribute('data-id');
    var meta = S.articles.find(function(a){ return a.id===id; });
    ctxTarget = { type:'art', id:id, title: meta ? meta.title : id };
    showCtxMenu(e);
  } else if (catEl) {
    var cat = catEl.getAttribute('data-cat');
    if (!cat) return;           /* 根目录不显示菜单 */
    e.preventDefault();
    ctxTarget = { type:'cat', cat:cat };
    document.getElementById('ctx-rename-item').textContent = '✏ 重命名目录';
    showCtxMenu(e);
  }
});

function showCtxMenu(e) {
  var menu = document.getElementById('ctx-menu');
  var isArt = ctxTarget.type === 'art';
  document.getElementById('ctx-rename-item').textContent = isArt ? '✏ 重命名文章' : '✏ 重命名目录';
  document.getElementById('ctx-newcat-item').style.display = isArt ? 'none' : '';
  document.getElementById('ctx-move-item').style.display   = isArt ? '' : 'none';
  var vw = window.innerWidth, vh = window.innerHeight;
  var mx = e.clientX, my = e.clientY;
  menu.style.left = '0'; menu.style.top = '0';
  menu.classList.add('open');
  var mw = menu.offsetWidth, mh = menu.offsetHeight;
  menu.style.left = Math.min(mx, vw-mw-4) + 'px';
  menu.style.top  = Math.min(my, vh-mh-4) + 'px';
}

// ── Export PDF（隐藏 iframe + Blob，避免 about:blank；@page 压缩浏览器页眉页脚区） ──
function printHtmlForPdf(html) {
  var blob = new Blob(['\ufeff', html], { type: 'text/html;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var ifr = document.createElement('iframe');
  ifr.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;opacity:0;pointer-events:none;';
  ifr.setAttribute('aria-hidden', 'true');
  ifr.src = url;
  var cleaned = false;
  function cleanup() {
    if (cleaned) return;
    cleaned = true;
    try { URL.revokeObjectURL(url); } catch (e) {}
    if (ifr.parentNode) ifr.parentNode.removeChild(ifr);
  }
  ifr.onload = function () {
    setTimeout(function () {
      var cw = ifr.contentWindow;
      if (!cw) { cleanup(); return; }
      try {
        cw.addEventListener('afterprint', cleanup);
      } catch (e) {}
      try {
        cw.focus();
        cw.print();
      } catch (e) {
        var w = window.open(url, '_blank');
        if (w) {
          try { w.addEventListener('afterprint', cleanup); } catch (e1) {}
          setTimeout(function () {
            try { w.focus(); w.print(); } catch (e2) {}
          }, 300);
          setTimeout(cleanup, 60000);
          return;
        }
        setStatus('请允许弹出窗口后重试');
        cleanup();
        return;
      }
      setTimeout(cleanup, 60000);
    }, 150);
  };
  document.body.appendChild(ifr);
}

function exportPdf() {
  var pv = document.getElementById('pane-view');
  var pe = document.getElementById('pane-edit');
  var inView = pv && pv.style.display !== 'none';
  var inEdit = pe && pe.style.display !== 'none';
  var title, cat, updated, body;

  if (inView && S.curId) {
    var meta = S.articles.find(function(a){ return a.id === S.curId; });
    title   = meta ? (meta.title || 'untitled') : 'untitled';
    cat     = meta ? (meta.category || '根目录') : '根目录';
    updated = meta ? (meta.updated || '').replace('T',' ').replace('Z','') : '';
    body    = document.getElementById('view-content').innerHTML;
  } else if (inEdit) {
    title = (document.getElementById('edit-title').value || '').trim() || 'untitled';
    var cv = document.getElementById('edit-category').value || '';
    cat = cv ? cv : '根目录';
    updated = '';
    var ta = document.getElementById('edit-textarea');
    body = md2html(ta ? ta.value : '', false);
  } else {
    setStatus('请先打开一篇文章，或进入编辑界面');
    return;
  }

  exportPdfBuildWindow(title, cat, updated, body);
}

// ── Upload Image ──────────────────────────────────────────────────────
function openImgUpload() { document.getElementById('img-file-input').click(); }

function doUploadFile(file) {
  if (!file) return;
  histFlush();
  /* 上传前先记录光标位置，异步完成后插入到原位置 */
  var ta = document.getElementById('edit-textarea');
  var insertPos = ta.selectionStart;
  /* 插入占位符，让用户立刻看到上传进行中 */
  var placeholder = '![上传中...](uploading)';
  ta.value = ta.value.substring(0, insertPos) + placeholder + ta.value.substring(ta.selectionEnd);
  ta.selectionStart = ta.selectionEnd = insertPos + placeholder.length;
  onEditorInput();
  setStatus('上传中…');
  fetch('/api/wiki-upload', {
    method:'POST',
    headers:{'Content-Type':'application/octet-stream','X-Wiki-Filename':encodeURIComponent(file.name),'X-Wiki-Category':encodeURIComponent(S.curCat||'')},
    body: file
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if (data.ok) {
      var isImg = /\.(jpg|jpeg|png|gif|svg|webp|bmp|ico)$/i.test(file.name);
      var md = isImg ? '!['+file.name+']('+data.url+')' : '['+file.name+']('+data.url+')';
      /* 用实际链接替换占位符 */
      ta.value = ta.value.replace(placeholder, md);
      ta.selectionStart = ta.selectionEnd = ta.value.indexOf(md) + md.length;
      ta.focus();
      onEditorInput();
      setStatus('上传成功');
      document.getElementById('img-file-input').value='';
    } else {
      ta.value = ta.value.replace(placeholder, '');
      onEditorInput();
      setStatus('上传失败：'+(data.error||''));
    }
  })
  .catch(function(err){
    ta.value = ta.value.replace(placeholder, '');
    onEditorInput();
    setStatus('上传失败：'+err.message);
  });
}

function onEditorDrop(e) {
  var file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (!file) return;
  e.preventDefault();
  doUploadFile(file);
}

function onEditorPaste(e) {
  var items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') === 0) {
      e.preventDefault();
      var blob = items[i].getAsFile();
      if (!blob) continue;
      /* 以当前时间戳自动命名 */
      var d = new Date();
      var pad = function(n){ return n < 10 ? '0'+n : ''+n; };
      var ts = d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())
             +'_'+pad(d.getHours())+pad(d.getMinutes())+pad(d.getSeconds());
      var ext = (blob.type.split('/')[1] || 'png').replace('jpeg','jpg');
      var filename = 'img_'+ts+'.'+ext;
      var file = new File([blob], filename, {type: blob.type});
      doUploadFile(file);
      return; /* 只处理第一张图片 */
    }
  }
}

// ── Toolbar ───────────────────────────────────────────────────────────
function tb(cmd) {
  histFlush();
  var ta = document.getElementById('edit-textarea');
  var start = ta.selectionStart, end = ta.selectionEnd;
  var sel = ta.value.substring(start, end);
  var before = ta.value.substring(0, start);
  var after  = ta.value.substring(end);
  var ins = sel, cur = start;

  switch(cmd) {
    case 'h1':      ins='# '+(sel||'标题'); cur=start+ins.length; break;
    case 'h2':      ins='## '+(sel||'标题'); cur=start+ins.length; break;
    case 'h3':      ins='### '+(sel||'标题'); cur=start+ins.length; break;
    case 'bold':    ins='**'+(sel||'粗体')+'**'; cur=start+ins.length; break;
    case 'italic':  ins='*'+(sel||'斜体')+'*'; cur=start+ins.length; break;
    case 'strike':  ins='~~'+(sel||'文字')+'~~'; cur=start+ins.length; break;
    case 'code':    ins='`'+(sel||'code')+'`'; cur=start+ins.length; break;
    case 'codeblock': ins='\n```\n'+(sel||'code')+'\n```\n'; cur=start+ins.length; break;
    case 'quote':   ins='> '+(sel||'引用内容'); cur=start+ins.length; break;
    case 'ul':      ins='- '+(sel||'列表项'); cur=start+ins.length; break;
    case 'ol':      ins='1. '+(sel||'列表项'); cur=start+ins.length; break;
    case 'hr':      ins='\n---\n'; cur=start+ins.length; break;
  }
  ta.value = before+ins+after;
  ta.selectionStart = ta.selectionEnd = cur;
  ta.focus();
  onEditorInput();
}

function onEditorKey(e) {
  if ((e.ctrlKey||e.metaKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault(); doUndo(); return;
  }
  if ((e.ctrlKey||e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey) || (e.key === 'Z' && e.shiftKey))) {
    e.preventDefault(); doRedo(); return;
  }
  if ((e.ctrlKey||e.metaKey) && e.altKey && (e.key === 't' || e.key === 'T')) {
    e.preventDefault();
    openTableModal();
    return;
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    insertAtCursor('  ');
  }
}

function buildMarkdownTable(bodyRows, cols) {
  bodyRows = Math.max(1, Math.min(30, bodyRows));
  cols = Math.max(1, Math.min(20, cols));
  var i, j, parts = [], line = '';
  for (i = 0; i < cols; i++) parts.push(' 列' + (i + 1) + ' ');
  line += '\n|' + parts.join('|') + '|\n';
  parts = [];
  for (i = 0; i < cols; i++) parts.push(' --- ');
  line += '|' + parts.join('|') + '|\n';
  for (i = 0; i < bodyRows; i++) {
    parts = [];
    for (j = 0; j < cols; j++) parts.push(' 数据 ');
    line += '|' + parts.join('|') + '|\n';
  }
  return line;
}

function openTableModal() {

function doInsertTable() {
  var cols = parseInt(document.getElementById('tbl-cols').value, 10);

  if (isNaN(bodyRows) || bodyRows < 1) bodyRows = 2;
  var md = buildMarkdownTable(bodyRows, cols);

  histFlush();
  insertAtCursor(md);
}

  onEditorInput();
}

var _previewTimer = null;
var _renderRaf = 0;
var _pendingContent = '';
var _lastPreviewContent = null;
var _lastHighlightContent = null;

function scheduleEditorRender(content) {
  _pendingContent = content;
  if (_renderRaf) return;
  _renderRaf = requestAnimationFrame(function() {
    _renderRaf = 0;
    updateEditorHighlight(_pendingContent);
    clearTimeout(_previewTimer);
    _previewTimer = setTimeout(function() {
      updatePreview(_pendingContent);
    }, 180);
  });
}

function onEditorInput() {
  var ta = document.getElementById('edit-textarea');
  var content = ta ? ta.value : '';
  scheduleEditorRender(content);
  refreshEditDirtyState();
  histSnapshotDeferred();
  scheduleAutoSave();
}

function updatePreview(content) {
  if (content === undefined) {
    var ta = document.getElementById('edit-textarea');
    content = ta ? ta.value : '';
  }
  var previewKey = content + '\n' + (S.previewAlign ? '1' : '0');
  if (previewKey === _lastPreviewContent) return;
  var right = document.getElementById('edit-right');
  if (!right || right.style.display === 'none') return;
  right.innerHTML = '<div class="panel-label" style="margin:-16px -20px 14px">预览</div>'
                  + md2html(content, !!S.previewAlign);
  scheduleRichRender(right);
  _lastPreviewContent = previewKey;
  if (S.previewAlign)
    requestAnimationFrame(function() { syncPreviewToCursor(); });
}

function togglePreviewAlign() {
  S.previewAlign = !S.previewAlign;
  var btn = document.getElementById('btn-preview-align');
  if (btn) btn.classList.toggle('on', S.previewAlign);
  _lastPreviewContent = null;
  var ta = document.getElementById('edit-textarea');
  updatePreview(ta ? ta.value : '');
}

var _previewScrollTimer = null;
function schedulePreviewScrollSync() {
  if (!S.previewAlign) return;
  clearTimeout(_previewScrollTimer);
  /* 略长于预览节流(180ms)，避免在未换新预览 DOM 前滚动 */
  _previewScrollTimer = setTimeout(syncPreviewToCursor, 220);
}

/** 根据编辑器光标所在行，将右侧预览滚动到对应块（需 md2html(..., true) 带 data-md-line） */
function syncPreviewToCursor() {
  if (!S.previewAlign) return;
  var ta = document.getElementById('edit-textarea');
  var right = document.getElementById('edit-right');
  if (!ta || !right || right.style.display === 'none') return;
  var pane = document.getElementById('pane-edit');
  if (!pane || pane.style.display === 'none') return;

  var text = ta.value;
  var pos = ta.selectionStart;
  var lineNum = text.substr(0, pos).split('\n').length;

  var nodes = right.querySelectorAll('[data-md-line]');
  if (!nodes.length) return;

  var elBefore = null, maxL = -1;
  var elAfter = null, minL = Infinity;
  for (var k = 0; k < nodes.length; k++) {
    var ln = parseInt(nodes[k].getAttribute('data-md-line'), 10);
    if (isNaN(ln)) continue;
    if (ln <= lineNum && ln >= maxL) {
      maxL = ln;
      elBefore = nodes[k];
    }
    if (ln >= lineNum && ln < minL) {
      minL = ln;
      elAfter = nodes[k];
    }
  }
  var target = elBefore || elAfter || nodes[0];
  try {
    target.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  } catch (e) {
    target.scrollIntoView(false);
  }
}

// ── Editor syntax highlight (mirror overlay) ──────────────────────────
function escM(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function enhanceInlineMarkdown(line) {
  var s = escM(line);
  s = s.replace(/`([^`\n]+)`/g, '<span class="hl-inline-code">`$1`</span>');
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<span class="hl-strong">**$1**</span>');
  s = s.replace(/\*([^*\n]+)\*/g, '<span class="hl-em">*$1*</span>');
  s = s.replace(/(\[[^\]]+\]\([^)]+\))/g, '<span class="hl-link">$1</span>');
  return s;
}

function updateEditorHighlight(content) {
  var hl = document.getElementById('editor-mirror');
  var ta = document.getElementById('edit-textarea');
  if (!hl || !ta) return;
  if (content === undefined) content = ta.value;
  if (content === _lastHighlightContent && hl.scrollTop === ta.scrollTop) return;
  syncMirrorMetrics();
  var lines = content.split('\n');
  var HCL = ['hl-h1','hl-h2','hl-h3','hl-h4','hl-h5','hl-h6'];
  var inCodeBlock = false;
  var html = lines.map(function(line) {
    var cls, inner = enhanceInlineMarkdown(line);
    var hm = line.match(/^(#{1,6})(\s|$)/);
    if (/^```/.test(line)) {
      cls = 'hl-fence';
      inCodeBlock = !inCodeBlock;
    } else if (inCodeBlock) {
      cls = 'hl-codeblock';
      inner = escM(line);
    } else if (hm) {
      cls = HCL[hm[1].length - 1] || 'hl-h6';
    } else if (/^>/.test(line)) {
      cls = 'hl-quote';
    } else if (/^(\s*)([-*+]|\d+\.) /.test(line)) {
      cls = 'hl-list';
    } else if (/^[-*_]{3,}\s*$/.test(line.trim())) {
      cls = 'hl-hr';
    } else {
      cls = 'hl-norm';
    }
    if (!inner) inner = '&nbsp;';
    return '<div style="line-height:22px"><span class="'+cls+'">'+inner+'</span></div>';
  }).join('');
  hl.innerHTML = html;
  hl.scrollTop = ta.scrollTop;
  _lastHighlightContent = content;
}

function syncMirrorMetrics() {
  var hl = document.getElementById('editor-mirror');
  var ta = document.getElementById('edit-textarea');
  if (!hl || !ta) return;
  // mirror 层按 textarea 的可视内容区尺寸对齐，避免软换行后错位
  hl.style.width = ta.clientWidth + 'px';
  hl.style.height = ta.clientHeight + 'px';
}

function syncMirrorScroll() {
  var hl = document.getElementById('editor-mirror');
  var ta = document.getElementById('edit-textarea');
  if (hl && ta) {
    syncMirrorMetrics();
    hl.scrollTop = ta.scrollTop;
  }
}

// ── Undo / Redo ───────────────────────────────────────────────────────
var _hist       = [];   // [{v, s, e}]  v=value, s=selStart, e=selEnd
var _histIdx    = -1;
var _histTimer  = null;
var _histIgnore = false;
var HIST_MAX    = 200;

function histSnapshot() {
  if (_histIgnore) return;
  var ta = document.getElementById('edit-textarea');
  if (!ta) return;
  var snap = { v: ta.value, s: ta.selectionStart, e: ta.selectionEnd };
  var cur  = _histIdx >= 0 ? _hist[_histIdx] : null;
  if (cur && cur.v === snap.v) return;          // 内容无变化，不重复记录
  if (_histIdx < _hist.length - 1)              // 截断撤消后的重做历史
    _hist.splice(_histIdx + 1);
  _hist.push(snap);
  if (_hist.length > HIST_MAX) _hist.shift();   // 超出上限，丢弃最旧
  _histIdx = _hist.length - 1;
  _updateUndoRedoBtns();
}

function histSnapshotDeferred() {
  clearTimeout(_histTimer);
  _histTimer = setTimeout(histSnapshot, 600);
}

function histFlush() {
  clearTimeout(_histTimer);
  histSnapshot();
}

function histReset() {
  clearTimeout(_histTimer);
  _hist    = [];
  _histIdx = -1;
  histSnapshot();           // 以当前内容作为初始快照
}

function doUndo() {
  histFlush();              // 先把当前未提交状态存入，确保可重做
  if (_histIdx <= 0) return;
  _histIdx--;
  _histApply();
}

function doRedo() {
  if (_histIdx >= _hist.length - 1) return;
  _histIdx++;
  _histApply();
}

function _histApply() {
  var snap = _hist[_histIdx];
  if (!snap) return;
  var ta = document.getElementById('edit-textarea');
  if (!ta) return;
  _histIgnore = true;
  ta.value = snap.v;
  try { ta.selectionStart = snap.s; ta.selectionEnd = snap.e; } catch(e) {}
  _histIgnore = false;
  updatePreview();
  updateEditorHighlight();
  _updateUndoRedoBtns();
}

function _updateUndoRedoBtns() {
  var u = document.getElementById('tb-undo');
  var r = document.getElementById('tb-redo');
  if (u) u.disabled = (_histIdx <= 0);
  if (r) r.disabled = (_histIdx >= _hist.length - 1);
}

// ── View mode toggle ──────────────────────────────────────────────────
function setViewMode(mode) {
  S.viewMode = mode;
  ['split','edit','prev'].forEach(function(m){
    document.getElementById('vt-'+m).classList.toggle('on', m===mode);
  });
  var left  = document.getElementById('edit-left');
  var right = document.getElementById('edit-right');
  if (mode==='split') { left.style.display='flex'; right.style.display='block'; left.style.flex='1'; }
  else if (mode==='edit') { left.style.display='flex'; right.style.display='none'; left.style.flex='1'; }
  else { left.style.display='none'; right.style.display='block'; }
  updatePreview();
  updateEditorHighlight();
}

// ── Pane switching ────────────────────────────────────────────────────
function showPane(name) {
  var pw = document.getElementById('pane-welcome');
  var pv = document.getElementById('pane-view');
  var pe = document.getElementById('pane-edit');
  pw.style.display = (name === 'welcome') ? 'flex' : 'none';

    pe.style.flexDirection  = 'column';

  }
}

// ── Markdown Renderer ─────────────────────────────────────────────────
/** syncLines：为预览同步滚动注入 data-md-line（1-based 源码行号） */
function mdLineAttr(sync, line) {
  return (sync && line > 0) ? ' data-md-line="'+line+'"' : '';
}

function md2html(src, syncLines) {
  if (!src) return '';
  if (!syncLines) syncLines = false;
  src = src.replace(/\r\n?/g, '\n');
  var saved = [];
  var savedFenceLine = [];

  function save(h, fenceLine) {
    saved.push(h);
    savedFenceLine.push(syncLines && fenceLine ? fenceLine : 0);
    return '\x00'+(saved.length-1)+'\x00';
  }

  // fenced code blocks（记录围栏起始行用于 data-md-line）
  src = src.replace(/^```([\w-]*) *\n([\s\S]*?)^```\s*$/gm, function(match, lang, code, offset) {
    var langName = (lang || '').trim().toLowerCase();
    var ln = syncLines ? src.substring(0, offset).split('\n').length : 0;
    if (langName === 'mermaid') {
      return save('<div class="mermaid-block"><div class="mermaid">'+he(code.replace(/\n$/,''))+'</div></div>', ln);
    }
    var cls = lang ? ' class="lang-'+he(lang)+'"' : '';
    var label = lang ? he(lang) : '代码';
    return save('<div class="code-block"><button class="copy-btn" title="复制'+label+'">⧉ 复制</button>'
              + '<pre><code'+cls+'>'+he(code.replace(/\n$/,''))+'</code></pre></div>', ln);
  });
  // inline code（不参与块级锚点）
  src = src.replace(/`([^`\n]+)`/g, function(_, c) {
    return save('<code>'+he(c)+'</code>', 0);
  });

  var lines = src.split('\n'), out = '', i = 0;
  var footDefs = {};
  var footDefOrder = [];
  for (var fi = 0; fi < lines.length; fi++) {
    var fm = lines[fi].match(/^\[\^([^\]\s]+)\]:\s*(.*)$/);
    if (!fm) continue;
    var fid = fm[1];
    if (!Object.prototype.hasOwnProperty.call(footDefs, fid)) {
      var chunks = [fm[2] || ''];
      lines[fi] = '';
      var fj = fi + 1;
      while (fj < lines.length) {
        var nl = lines[fj];
        if (/^(?:\t| {2,})/.test(nl)) {
          chunks.push(nl.replace(/^(?:\t| {2,})/, ''));
          lines[fj] = '';
          fj++;
          continue;
        }
        if (!nl.trim()) {
          chunks.push('');
          lines[fj] = '';
          fj++;
          continue;
        }
        break;
      }
      footDefs[fid] = chunks.join('\n').replace(/\n+$/,'');
      footDefOrder.push(fid);
      fi = fj - 1;
    } else {
      lines[fi] = '';
    }
  }
  var footCtx = { defs: footDefs, refOrder: [], refIndex: {} };

  while (i < lines.length) {
    var L = lines[i];
    // placeholder line
    if (/^\x00\d+\x00$/.test(L.trim())) { out+=L.trim()+'\n'; i++; continue; }
    // blank
    if (!L.trim()) { out+='\n'; i++; continue; }
    // display math block ($$ ... $$)
    if (/^\s*\$\$/.test(L)) {
      var mln = syncLines ? (i + 1) : 0;
      var math = '';
      var single = L.match(/^\s*\$\$(.*?)\$\$\s*$/);
      if (single) {
        math = single[1] || '';
        i++;
      } else {
        var first = L.replace(/^\s*\$\$\s*/, '');
        var buf = [];
        if (first) buf.push(first);
        i++;
        while (i < lines.length) {
          var end = lines[i].match(/^(.*)\$\$\s*$/);
          if (end) {
            if (end[1]) buf.push(end[1]);
            i++;
            break;
          }
          buf.push(lines[i]);
          i++;
        }
        math = buf.join('\n');
      }
      out += '<div class="math-block"' + mdLineAttr(syncLines, mln) + '>\\[' + he(math) + '\\]</div>\n';
      continue;
    }
    // heading
    var hm = L.match(/^(#{1,6}) (.*)/);
    if (hm) {
      var hln = syncLines ? (i + 1) : 0;
      out += '<h'+hm[1].length + mdLineAttr(syncLines, hln) + '>' + il(hm[2], footCtx) + '</h'+hm[1].length+'>\n';
      i++; continue;
    }
    // HR
    if (/^[-*_]{3,}\s*$/.test(L)) {
      out += '<hr' + mdLineAttr(syncLines, syncLines ? i + 1 : 0) + '>\n';
      i++; continue;
    }
    // blockquote
    if (/^> ?/.test(L)) {
      var bqln = syncLines ? (i + 1) : 0;
      var bq=[];
      while(i<lines.length && /^> ?/.test(lines[i])) bq.push(il(lines[i++].replace(/^> ?/,''), footCtx));
      out += '<blockquote' + mdLineAttr(syncLines, bqln) + '>' + bq.join('<br>') + '</blockquote>\n';
      continue;
    }
    // unordered list
    if (/^[-*+] /.test(L)) {
      out += '<ul' + mdLineAttr(syncLines, syncLines ? i + 1 : 0) + '>';
      while(i<lines.length && /^[-*+] /.test(lines[i])) {
        var uln = syncLines ? (i + 1) : 0;
        out += '<li' + mdLineAttr(syncLines, uln) + '>' + il(lines[i++].replace(/^[-*+] /,''), footCtx) + '</li>';
      }
      out += '</ul>\n'; continue;
    }
    // ordered list
    if (/^\d+\. /.test(L)) {
      out += '<ol' + mdLineAttr(syncLines, syncLines ? i + 1 : 0) + '>';
      while(i<lines.length && /^\d+\. /.test(lines[i])) {
        var oln = syncLines ? (i + 1) : 0;
        out += '<li' + mdLineAttr(syncLines, oln) + '>' + il(lines[i++].replace(/^\d+\. /,''), footCtx) + '</li>';
      }
      out += '</ol>\n'; continue;
    }
    // table: next line is separator
    if (L.includes('|') && i+1<lines.length && /^\|?[-: |]+\|/.test(lines[i+1])) {
      var tbln = syncLines ? (i + 1) : 0;
      var hds=splitRow(L), aligns=splitRow(lines[i+1]).map(function(c){
        c=c.trim(); return /^:-+:$/.test(c)?'center':/-:$/.test(c)?'right':'';
      });
      i+=2;
      out += '<table' + mdLineAttr(syncLines, tbln) + '><thead><tr>' + hds.map(function(h,j){
        return '<th'+(aligns[j]?' style="text-align:'+aligns[j]+'"':'')+'>'+il(h.trim(), footCtx)+'</th>';
      }).join('')+'</tr></thead><tbody>';
      while(i<lines.length && lines[i].trim() && lines[i].includes('|')){
        out+='<tr>'+splitRow(lines[i++]).map(function(c,j){
          return '<td'+(aligns[j]?' style="text-align:'+aligns[j]+'"':'')+'>'+il(c.trim(), footCtx)+'</td>';
        }).join('')+'</tr>';
      }
      out+='</tbody></table>\n'; continue;
    }
    // paragraph: collect consecutive text lines
    var para=[];
    var paraln = syncLines ? (i + 1) : 0;
    while(i<lines.length){
      var l=lines[i];
      if(!l.trim()||/^#{1,6} /.test(l)||/^> ?/.test(l)||/^[-*+] /.test(l)||/^\d+\. /.test(l)||/^[-*_]{3,}\s*$/.test(l.trim())||/^\x00\d+\x00$/.test(l)) break;
      para.push(il(l, footCtx)); i++;
    }
    if(para.length) out += '<p' + mdLineAttr(syncLines, paraln) + '>' + para.join('<br>') + '</p>\n';
    else i++; // safety
  }

  // restore placeholders；代码块补上 data-md-line（与 fenced 行号一致）
  out = out.replace(/\x00(\d+)\x00/g, function(_, n) {
    var idx = +n;
    var h = saved[idx];
    var fl = savedFenceLine[idx];
    if (syncLines && fl > 0 && /^<div class="code-block"/.test(h) && h.indexOf('data-md-line') < 0)
      h = h.replace('<div class="code-block"', '<div class="code-block"' + mdLineAttr(true, fl));
    return h;
  });

  var footRenderOrder = footCtx.refOrder.slice();
  footDefOrder.forEach(function(fid){
    if (footRenderOrder.indexOf(fid) < 0) footRenderOrder.push(fid);
  });
  if (footRenderOrder.length) {
    out += '<section class="footnotes"><hr><ol>';
    footRenderOrder.forEach(function(fid, idx){
      var def = footDefs[fid];
      if (def == null) return;
      var aid = footAnchorId(fid);
      var n = footCtx.refIndex[fid] || (idx + 1);
      var body = def.split('\n').map(function(line){ return il(line, footCtx); }).join('<br>');
      out += '<li id="fn-' + aid + '" value="' + n + '">' + body
          + ' <a class="fn-backref" href="#fnref-' + aid + '" title="返回正文">↩</a></li>';
    });
    out += '</ol></section>\n';
  }
  return out;
}

var _richRenderTimer = null;
var _mermaidReady = false;
var _richRetryCount = 0;

function scheduleRichRender(root) {
  clearTimeout(_richRenderTimer);
  _richRenderTimer = setTimeout(function() { renderMathAndMermaid(root); }, 40);
}

function renderMathAndMermaid(root) {
  if (!root) return;
  var hasMJ = !!(window.MathJax && window.MathJax.typesetPromise);
  var hasMermaid = !!window.mermaid;

  if (!hasMJ && !hasMermaid) {
    if (_richRetryCount < 20) {
      _richRetryCount++;
      setTimeout(function() { renderMathAndMermaid(root); }, 250);
    }
    return;
  }
  _richRetryCount = 0;

  if (hasMJ) {
    try { if (window.MathJax.typesetClear) window.MathJax.typesetClear([root]); } catch (e) {}
    window.MathJax.typesetPromise([root]).catch(function(){});
  }

  if (hasMermaid) {
    if (!_mermaidReady) {
      try {
        window.mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });
        _mermaidReady = true;
      } catch (e) {}
    }
    var nodes = root.querySelectorAll('.mermaid');
    if (nodes.length) {
      try {
        nodes.forEach(function(n){ n.removeAttribute('data-processed'); });
        window.mermaid.run({ nodes: Array.prototype.slice.call(nodes) });
      } catch (e) {}
    }
  }
}

function splitRow(row){ return row.replace(/^\||\|$/g,'').split('|'); }

function he(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function footAnchorId(id){ return String(id||'').replace(/[^\w-]/g,'_'); }

function il(s, footCtx){
  var ilsaved = [], ilph = function(v){ ilsaved.push(v); return '\x01'+(ilsaved.length-1)+'\x01'; };
  var mathsaved = [], maph = function(v){ mathsaved.push(v); return '\x02'+(mathsaved.length-1)+'\x02'; };
  s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)[^)]*\)/g, function(_,alt,url){ return ilph('<img src="'+url+'" alt="'+alt+'" style="max-width:100%">'); });
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_,txt,url){ return ilph('<a href="'+url+'" target="_blank">'+txt+'</a>'); });
  if (footCtx && footCtx.defs) {
    s = s.replace(/\[\^([^\]\s]+)\]/g, function(all, fid){
      if (!Object.prototype.hasOwnProperty.call(footCtx.defs, fid)) return all;
      var idx = footCtx.refIndex[fid];
      if (!idx) {
        footCtx.refOrder.push(fid);
        idx = footCtx.refOrder.length;
        footCtx.refIndex[fid] = idx;
      }
      var aid = footAnchorId(fid);
      return ilph('<sup class="fn-ref" id="fnref-'+aid+'"><a href="#fn-'+aid+'">['+idx+']</a></sup>');
    });
  }
  s = (function(raw) {
    var out = '', i = 0;
    while (i < raw.length) {
      if (raw[i] === '\\' && i + 1 < raw.length && raw[i + 1] === '$') {
        out += '\\$';
        i += 2;
        continue;
      }
      if (raw[i] !== '$' || (i + 1 < raw.length && raw[i + 1] === '$')) {
        out += raw[i++];
        continue;
      }
      var j = i + 1;
      while (j < raw.length) {
        if (raw[j] === '$' && raw[j - 1] !== '\\') break;
        j++;
      }
      if (j >= raw.length) {
        out += raw[i++];
        continue;
      }
      var tex = raw.slice(i + 1, j);
      if (tex.trim()) out += maph(tex);
      else out += raw.slice(i, j + 1);
      i = j + 1;
    }
    return out;
  })(s);
  s = s.replace(/\*\*\*([^*\n]+)\*\*\*/g,'<strong><em>$1</em></strong>');
  s = s.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
  s = s.replace(/__([^_\n]+)__/g,'<strong>$1</strong>');
  s = s.replace(/_([^_\n]+)_/g,'<em>$1</em>');
  s = s.replace(/~~([^~\n]+)~~/g,'<del>$1</del>');
  s = s.replace(/\x02(\d+)\x02/g, function(_,n){
    return '<span class="math-inline">\\(' + he(mathsaved[+n]) + '\\)</span>';
  });
  s = s.replace(/\x01(\d+)\x01/g, function(_,n){ return ilsaved[+n]; });
  return s;
}

// ── Utils ─────────────────────────────────────────────────────────────
function setStatus(msg){ document.getElementById('status-msg').textContent = msg; }
function escH(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function esc(s){ return (s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

// ── Copy code button ──────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  var btn = e.target.closest('.copy-btn');
  if (!btn) return;
  var pre = btn.parentElement.querySelector('pre');
  var text = pre ? pre.textContent : '';
  function onCopied() {
    var orig = btn.textContent;
    btn.textContent = '✓ 已复制';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onCopied).catch(function() { fallbackCopy(text, onCopied); });
  } else {
    fallbackCopy(text, onCopied);
  }
});
function fallbackCopy(text, cb) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

// ── Keyboard shortcuts ────────────────────────────────────────────────
document.addEventListener('keydown', function(e){
  if ((e.ctrlKey||e.metaKey) && e.key==='s' && document.getElementById('pane-edit').style.display!=='none'){
    e.preventDefault(); saveArticle();
  }
  if (e.key==='Escape'){
    if(document.getElementById('modal-newarticle').classList.contains('open')) closeNewArticleModal();
    if(document.getElementById('modal-newcat').classList.contains('open')) closeNewCatModal();
    if(document.getElementById('modal-rename').classList.contains('open')) closeRenameModal();
    if(document.getElementById('modal-move').classList.contains('open')) closeMoveModal();
    if(document.getElementById('modal-table').classList.contains('open')) closeTableModal();
    if(document.getElementById('modal-link').classList.contains('open')) closeLinkModal();
    document.getElementById('ctx-menu').classList.remove('open');
  }
});

// ── IME composition 兜底 ──────────────────────────────────────────────
// 部分浏览器在 compositionend 后不再触发 oninput，导致 mirror 停留在上屏前状态。
// 此处仅做兜底：compositionend 后延一个 tick 刷新，确保 textarea.value 已提交。
// 注意：不在 onEditorInput 内屏蔽合成期——若 compositionstart/end 不成对出现
// （已知浏览器 bug），屏蔽会导致 _composing 卡住，后续所有输入全部失效。
document.getElementById('edit-textarea').addEventListener('compositionend', function() {
  setTimeout(onEditorInput, 0);
});

  syncMirrorMetrics();
  syncMirrorScroll();
});
