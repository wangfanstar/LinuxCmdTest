<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register 文件管理</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --surface2:#1e2740;
  --border:  #30363d;
  --border2: #2d3a54;
  --text:    #c9d1d9;
  --dim:     #8b949e;
  --accent:  #4a90e2;
  --green:   #3fb950;
  --red:     #f85149;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── 顶栏 ── */
.topbar {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
}
.topbar h1 { font-size: 1rem; font-weight: 700; color: #f0f6fc; }
.topbar-sep { flex: 1; }
.topbar a { font-size: 13px; color: var(--dim); text-decoration: none; }
.topbar a:hover { color: var(--text); }

/* ── 工具栏 ── */
.toolbar {
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.search-box {
  flex: 1; min-width: 180px; max-width: 320px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  color: var(--text);
  font-size: 0.85rem;
  outline: none;
}
.search-box:focus { border-color: var(--accent); }
.btn {
  padding: 6px 14px;
  border: none;
  border-radius: 6px;
  font-size: 0.82rem;
  cursor: pointer;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: opacity .15s;
}
.btn:hover { opacity: .85; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary  { background: var(--accent); color: #fff; }
.btn-secondary{ background: #27334d; color: var(--text); border: 1px solid var(--border2); }
.btn-danger   { background: #3a1a1a; color: var(--red); border: 1px solid #5a2a2a; }
.status-msg { font-size: 0.8rem; color: var(--dim); }

/* ── 主体 ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── 左侧目录树 ── */
.sidebar {
  width: 210px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}
.tree-label {
  padding: 5px 16px;
  font-size: 0.75rem;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.tree-node {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  cursor: pointer;
  font-size: 0.84rem;
  color: var(--text);
  border-left: 2px solid transparent;
  transition: background .1s;
  user-select: none;
}
.tree-node:hover { background: rgba(255,255,255,.04); }
.tree-node.active {
  background: rgba(74,144,226,.12);
  border-left-color: var(--accent);
  color: #f0f6fc;
}

/* ── 右侧内容 ── */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

/* 路径 + 选中条 */
.content-head {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.path-bar { font-size: 0.82rem; color: var(--dim); flex: 1; }
.path-bar span { color: var(--text); }
.sel-bar {
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 0.82rem;
  color: var(--dim);
}
.sel-bar.visible { display: flex; }
.sel-count { color: var(--accent); font-weight: 600; }

/* ── 列表 ── */
.file-list { flex: 1; overflow-y: auto; }

.list-header, .list-row {
  display: grid;
  grid-template-columns: 36px 24px 1fr 70px 120px;
  align-items: center;
  gap: 0;
  padding: 0 10px;
}
.list-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--dim);
  height: 36px;
  position: sticky;
  top: 0;
  z-index: 1;
  user-select: none;
}
.list-row {
  border-bottom: 1px solid rgba(48,54,61,.5);
  height: 42px;
  transition: background .1s;
}
.list-row:hover { background: rgba(255,255,255,.03); }
.list-row.selected { background: rgba(74,144,226,.08); }
.list-row.renaming { background: rgba(74,144,226,.12); }

.col-chk  { display: flex; align-items: center; justify-content: center; }
.col-chk input[type="checkbox"] {
  width: 14px; height: 14px;
  accent-color: var(--accent);
  cursor: pointer;
}
.col-icon { font-size: 1rem; }
.col-name {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  padding-right: 8px;
}
.name-text {
  font-size: 0.85rem;
  color: #f0f6fc;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: default;
}
.name-text.clickable { cursor: pointer; color: var(--accent); }
.name-text.clickable:hover { text-decoration: underline; }
.name-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--accent);
  border-radius: 4px;
  color: #f0f6fc;
  font-size: 0.84rem;
  padding: 2px 7px;
  outline: none;
}
.col-type { font-size: 0.75rem; color: var(--dim); }
.ext-badge {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  display: inline-block;
}
.ext-xml  { background: #1f3a6e; color: #7ab8ff; }
.ext-json { background: #1a3a24; color: #7cdba0; }
.ext-dir  { background: #2d2a1a; color: #d29922; }
.col-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 2px;
}
.icon-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 7px;
  border-radius: 4px;
  font-size: 0.82rem;
  color: var(--dim);
  transition: background .1s, color .1s;
}
.icon-btn:hover { background: rgba(255,255,255,.07); color: var(--text); }
.icon-btn.confirm { color: var(--green); }
.icon-btn.cancel  { color: var(--red); }
.icon-btn.del     { color: var(--red); }

.empty-tip {
  text-align: center;
  color: var(--dim);
  font-size: 0.85rem;
  padding: 48px 0;
}

/* ── 上传进度 ── */
.upload-bar {
  display: none;
  position: fixed;
  bottom: 20px; right: 20px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 18px;
  font-size: 0.82rem;
  color: var(--text);
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
  z-index: 999;
  min-width: 220px;
}

/* ── 弹窗 ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 9999;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  width: 360px;
  max-width: 94vw;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.modal-head {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-weight: 600;
  font-size: 0.9rem;
  color: #f0f6fc;
}
.modal-body { padding: 16px; }
.modal-foot {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border2);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.field-label { font-size: 0.8rem; color: var(--dim); margin-bottom: 5px; display: block; }
.field-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 5px;
  color: var(--text);
  font-size: 0.82rem;
  padding: 6px 9px;
  outline: none;
  margin-bottom: 10px;
}
.field-input:focus { border-color: var(--accent); }
.close-btn {
  background: none; border: none;
  color: var(--dim); font-size: 1.1rem;
  cursor: pointer; padding: 0 4px; line-height: 1;
}
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <h1>📁 Register 文件管理</h1>
  <div class="topbar-sep"></div>
  <a href="index.html">← 返回首页</a>
</div>

<!-- 工具栏 -->
<div class="toolbar">
  <input class="search-box" id="search-input" type="text" placeholder="搜索文件名…" oninput="renderContent()">
  <label class="btn btn-primary" for="upload-input" style="cursor:pointer;">⬆ 上传文件</label>
  <input type="file" id="upload-input" multiple accept=".xml,.json" style="display:none" onchange="doUpload(this.files)">
  <button class="btn btn-secondary" onclick="openNewDirModal()">＋ 新建文件夹</button>
  <button class="btn btn-secondary" onclick="refreshAll()">↺ 刷新</button>
  <span class="status-msg" id="status-msg"></span>
</div>

<!-- 主体 -->
<div class="layout">
  <!-- 目录树 -->
  <div class="sidebar">
    <div class="tree-label">文件夹</div>
    <div id="tree-root"></div>
  </div>

  <!-- 文件内容 -->
  <div class="content">
    <!-- 路径 + 选中操作条 -->
    <div class="content-head">
      <button id="btn-up" onclick="goUp()" title="返回上级" style="display:none;background:none;border:none;color:var(--dim);cursor:pointer;font-size:0.85rem;padding:4px 8px;border-radius:5px;margin-right:4px;white-space:nowrap;" onmouseover="this.style.background='rgba(255,255,255,.06)'" onmouseout="this.style.background='none'">↑ 上级</button>
      <div class="path-bar" id="path-bar">register/</div>
      <div class="sel-bar" id="sel-bar">
        <span class="sel-count" id="sel-count">已选 0 项</span>
        <button class="btn btn-danger" onclick="deleteSelected()">🗑 删除选中</button>
        <button class="btn btn-secondary" onclick="clearSelection()">取消</button>
      </div>
    </div>

    <!-- 列表 -->
    <div class="file-list" id="file-list">
      <div class="list-header">
        <div class="col-chk"><input type="checkbox" id="chk-all" onchange="toggleSelectAll(this.checked)" title="全选/取消"></div>
        <div></div>
        <div>名称</div>
        <div>类型</div>
        <div style="text-align:right;">操作</div>
      </div>
      <div id="list-body"></div>
      <div class="empty-tip" id="empty-tip" style="display:none">该文件夹为空</div>
    </div>
  </div>
</div>

<!-- 上传进度条 -->
<div class="upload-bar" id="upload-bar"></div>

<!-- 新建文件夹弹窗 -->
<div class="modal-overlay" id="newdir-modal">
  <div class="modal-box">
    <div class="modal-head">
      ＋ 新建子文件夹
      <button class="close-btn" onclick="closeNewDirModal()">✕</button>
    </div>
    <div class="modal-body">
      <label class="field-label">父文件夹</label>
      <select id="newdir-parent" class="field-input">
        <option value="">register/（根目录）</option>
      </select>
      <label class="field-label">文件夹名称</label>
      <input id="newdir-name" class="field-input" type="text" placeholder="例：chip_A" spellcheck="false"
             onkeydown="if(event.key==='Enter')doCreateDir()">
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeNewDirModal()">取消</button>
      <button class="btn btn-primary" onclick="doCreateDir()">创建</button>
    </div>
  </div>
</div>

<script>
// ── 状态 ──────────────────────────────────────────────────
var allFiles  = [];
var allDirs   = [];
var curDir    = '';
var selectedItems = new Set();  // 'f:relPath' | 'd:dirPath'

// ── 初始化 ────────────────────────────────────────────────
function init() { refreshAll(); }

function refreshAll() {
  setStatus('加载中…');
  Promise.all([
    fetch('/api/list-register-files').then(function(r){ return r.json(); }),
    fetch('/api/list-register-dirs').then(function(r){ return r.json(); })
  ]).then(function(results) {
    var filesData = results[0], dirsData = results[1];
    allFiles = (filesData.files || []).map(function(relPath) {
      var slash = relPath.lastIndexOf('/');
      return {
        relPath: relPath,
        dir:  slash >= 0 ? relPath.slice(0, slash) : '',
        name: slash >= 0 ? relPath.slice(slash + 1) : relPath,
        ext:  relPath.split('.').pop().toLowerCase()
      };
    });
    allDirs = dirsData.dirs || [];
    selectedItems.clear();
    renderTree();
    renderContent();
    setStatus('');
  }).catch(function(e) { setStatus('加载失败：' + e.message); });
}

// ── 目录树 ────────────────────────────────────────────────
function renderTree() {
  var root = document.getElementById('tree-root');
  var tree = {};
  allDirs.forEach(function(d) {
    var parts = d.split('/'), cur = tree;
    parts.forEach(function(p) { if (!cur[p]) cur[p] = {}; cur = cur[p]; });
  });
  function renderSubtree(node, prefix, depth) {
    var h = '';
    Object.keys(node).sort().forEach(function(name) {
      var path = prefix ? prefix + '/' + name : name;
      h += '<div class="tree-node' + (curDir === path ? ' active' : '') + '" '
         + 'onclick="selectDir(\'' + escAttr(path) + '\')" '
         + 'style="padding-left:' + (16 + depth * 14) + 'px;">'
         + '📂 ' + escHtml(name) + '</div>';
      h += renderSubtree(node[name], path, depth + 1);
    });
    return h;
  }
  root.innerHTML =
    '<div class="tree-node' + (curDir === '' ? ' active' : '') + '" onclick="selectDir(\'\')">'
    + '📁 register/</div>'
    + renderSubtree(tree, '', 0);
}

function selectDir(dir) {
  curDir = dir;
  selectedItems.clear();
  renderTree();
  renderContent();
}

function goUp() {
  if (!curDir) return;
  var slash = curDir.lastIndexOf('/');
  selectDir(slash >= 0 ? curDir.slice(0, slash) : '');
}

// ── 渲染列表 ──────────────────────────────────────────────
function renderContent() {
  var q = (document.getElementById('search-input').value || '').trim().toLowerCase();
  var bar = document.getElementById('path-bar');
  bar.innerHTML = 'register/' + (curDir ? '<span>/' + escHtml(curDir) + '</span>' : '');
  document.getElementById('btn-up').style.display = curDir ? '' : 'none';

  var files   = allFiles.filter(function(f) {
    return f.dir === curDir && (!q || f.name.toLowerCase().includes(q));
  });
  var subdirs = q ? [] : getImmediateSubdirs(curDir);
  var body    = document.getElementById('list-body');
  var empty   = document.getElementById('empty-tip');

  if (!files.length && !subdirs.length) {
    body.innerHTML = '';
    empty.style.display = 'block';
    updateSelBar();
    return;
  }
  empty.style.display = 'none';

  var rows = '';

  // 文件夹行
  subdirs.forEach(function(d) {
    var name = d.split('/').pop();
    var key  = 'd:' + d;
    var chk  = selectedItems.has(key);
    rows += '<div class="list-row' + (chk ? ' selected' : '') + '" id="row-' + escAttr(key) + '">'
          + '<div class="col-chk"><input type="checkbox" class="row-chk" data-key="' + escAttr(key) + '"'
          + (chk ? ' checked' : '') + ' onchange="toggleItem(\'' + escAttr(key) + '\',this.checked)"></div>'
          + '<div class="col-icon">📂</div>'
          + '<div class="col-name">'
          +   '<span class="name-text clickable" id="dname-' + escAttr(d) + '" onclick="selectDir(\'' + escAttr(d) + '\')">' + escHtml(name) + '</span>'
          + '</div>'
          + '<div class="col-type"><span class="ext-badge ext-dir">DIR</span></div>'
          + '<div class="col-actions">'
          +   '<button class="icon-btn" title="重命名" onclick="startRenameDir(\'' + escAttr(d) + '\')">✏</button>'
          +   '<button class="icon-btn del" title="删除" onclick="deleteDir(\'' + escAttr(d) + '\')">🗑</button>'
          + '</div>'
          + '</div>';
  });

  // 文件行
  files.forEach(function(f) {
    var key  = 'f:' + f.relPath;
    var chk  = selectedItems.has(key);
    var icon = f.ext === 'json' ? '📄' : '🗂';
    rows += '<div class="list-row' + (chk ? ' selected' : '') + '" id="row-' + escAttr(key) + '">'
          + '<div class="col-chk"><input type="checkbox" class="row-chk" data-key="' + escAttr(key) + '"'
          + (chk ? ' checked' : '') + ' onchange="toggleItem(\'' + escAttr(key) + '\',this.checked)"></div>'
          + '<div class="col-icon">' + icon + '</div>'
          + '<div class="col-name">'
          +   '<span class="name-text" id="fname-' + escAttr(f.relPath) + '">' + escHtml(f.name) + '</span>'
          + '</div>'
          + '<div class="col-type"><span class="ext-badge ext-' + f.ext + '">' + f.ext.toUpperCase() + '</span></div>'
          + '<div class="col-actions">'
          +   '<a class="icon-btn" href="/register/' + encodeURI(f.relPath) + '" download title="下载">⬇</a>'
          +   '<button class="icon-btn" title="重命名" onclick="startRename(\'' + escAttr(f.relPath) + '\')">✏</button>'
          +   '<button class="icon-btn del" title="删除" onclick="deleteFile(\'' + escAttr(f.relPath) + '\')">🗑</button>'
          + '</div>'
          + '</div>';
  });

  body.innerHTML = rows;
  updateSelBar();
}

function getImmediateSubdirs(parentDir) {
  return allDirs.filter(function(d) {
    if (parentDir === '') return d.indexOf('/') === -1;
    return d.startsWith(parentDir + '/') &&
           d.slice(parentDir.length + 1).indexOf('/') === -1;
  });
}

// ── 选中逻辑 ──────────────────────────────────────────────
function toggleItem(key, checked) {
  if (checked) selectedItems.add(key); else selectedItems.delete(key);
  var row = document.getElementById('row-' + key);
  if (row) row.classList.toggle('selected', checked);
  updateSelBar();
}

function toggleSelectAll(checked) {
  document.querySelectorAll('.row-chk').forEach(function(chk) {
    var key = chk.dataset.key;
    chk.checked = checked;
    if (checked) selectedItems.add(key); else selectedItems.delete(key);
    var row = document.getElementById('row-' + key);
    if (row) row.classList.toggle('selected', checked);
  });
  updateSelBar();
}

function clearSelection() {
  selectedItems.clear();
  document.querySelectorAll('.row-chk').forEach(function(chk) { chk.checked = false; });
  document.querySelectorAll('.list-row').forEach(function(r) { r.classList.remove('selected'); });
  updateSelBar();
}

function updateSelBar() {
  var n   = selectedItems.size;
  var bar = document.getElementById('sel-bar');
  document.getElementById('sel-count').textContent = '已选 ' + n + ' 项';
  bar.classList.toggle('visible', n > 0);

  // 全选复选框状态
  var chks = document.querySelectorAll('.row-chk');
  var allChk = document.getElementById('chk-all');
  if (allChk && chks.length) {
    var allChecked  = Array.prototype.every.call(chks, function(c){ return c.checked; });
    var someChecked = Array.prototype.some.call(chks,  function(c){ return c.checked; });
    allChk.checked       = allChecked;
    allChk.indeterminate = !allChecked && someChecked;
  }
}

// ── 批量删除 ──────────────────────────────────────────────
function deleteSelected() {
  if (!selectedItems.size) return;
  var keys = Array.from(selectedItems);
  var names = keys.map(function(k) { return k.slice(2); }).join('\n');
  if (!confirm('确定删除以下 ' + keys.length + ' 项？\n\n' + names)) return;

  setStatus('删除中…');
  var done = 0, failed = 0;

  keys.forEach(function(key) {
    var isDir = key.charAt(0) === 'd';
    var path  = key.slice(2);
    var api   = isDir ? '/api/delete-register-dir' : '/api/delete-register-file';
    fetch(api, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: path })
    })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (!data.ok) failed++;
      done++;
      if (done === keys.length) {
        setStatus(failed ? failed + ' 项删除失败' : '已删除 ' + done + ' 项');
        // 若当前目录被删则退到根
        keys.forEach(function(k) {
          if (k.charAt(0) === 'd') {
            var p = k.slice(2);
            if (curDir === p || curDir.startsWith(p + '/')) curDir = '';
          }
        });
        refreshAll();
      }
    })
    .catch(function() {
      failed++; done++;
      if (done === keys.length) { setStatus(failed + ' 项删除失败'); refreshAll(); }
    });
  });
}

// ── 文件重命名 ────────────────────────────────────────────
var _renamingPath = null;
function startRename(relPath) {
  if (_renamingPath) cancelRename();
  if (_renamingDir)  cancelRenameDir();
  _renamingPath = relPath;

  var f = allFiles.find(function(x){ return x.relPath === relPath; });
  if (!f) return;
  var key = 'f:' + relPath;
  var row = document.getElementById('row-' + key);
  if (!row) return;
  row.classList.add('renaming');

  var nameEl = document.getElementById('fname-' + relPath);
  var inp = document.createElement('input');
  inp.className = 'name-input';
  inp.value = f.name;
  inp.id = 'rename-inp';
  inp.onkeydown = function(e) {
    if (e.key === 'Enter') confirmRename();
    if (e.key === 'Escape') cancelRename();
  };
  nameEl.replaceWith(inp);
  inp.focus(); inp.select();

  var acts = row.querySelector('.col-actions');
  acts.innerHTML =
    '<button class="icon-btn confirm" onclick="confirmRename()">✓</button>' +
    '<button class="icon-btn cancel"  onclick="cancelRename()">✕</button>';
}

function confirmRename() {
  if (!_renamingPath) return;
  var inp = document.getElementById('rename-inp');
  if (!inp) return;
  var newName = inp.value.trim();
  if (!newName) { inp.focus(); return; }
  var f = allFiles.find(function(x){ return x.relPath === _renamingPath; });
  if (!f || newName === f.name) { cancelRename(); return; }
  if (!newName.endsWith('.json') && !newName.endsWith('.xml')) newName += '.' + f.ext;
  var toPath = f.dir ? f.dir + '/' + newName : newName;
  setStatus('重命名中…');
  fetch('/api/rename-register-file', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ from: _renamingPath, to: toPath })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if (data.ok) { setStatus('重命名成功'); _renamingPath = null; refreshAll(); }
    else { setStatus('重命名失败：' + (data.error || '')); cancelRename(); }
  })
  .catch(function(e) { setStatus('请求失败：' + e.message); cancelRename(); });
}

function cancelRename() { _renamingPath = null; renderContent(); }

// ── 文件夹重命名 ──────────────────────────────────────────
var _renamingDir = null;
function startRenameDir(dirPath) {
  if (_renamingDir)  cancelRenameDir();
  if (_renamingPath) cancelRename();
  _renamingDir = dirPath;
  var key = 'd:' + dirPath;
  var row = document.getElementById('row-' + key);
  if (!row) return;
  row.classList.add('renaming');

  var nameEl = document.getElementById('dname-' + dirPath);
  var name = dirPath.split('/').pop();
  var inp = document.createElement('input');
  inp.className = 'name-input';
  inp.value = name;
  inp.id = 'rename-dir-inp';
  inp.onkeydown = function(e) {
    if (e.key === 'Enter') confirmRenameDir();
    if (e.key === 'Escape') cancelRenameDir();
  };
  nameEl.replaceWith(inp);
  inp.focus(); inp.select();

  var acts = row.querySelector('.col-actions');
  acts.innerHTML =
    '<button class="icon-btn confirm" onclick="confirmRenameDir()">✓</button>' +
    '<button class="icon-btn cancel"  onclick="cancelRenameDir()">✕</button>';
}

function confirmRenameDir() {
  if (!_renamingDir) return;
  var inp = document.getElementById('rename-dir-inp');
  if (!inp) return;
  var newName = inp.value.trim();
  if (!newName) { inp.focus(); return; }
  var oldName = _renamingDir.split('/').pop();
  if (newName === oldName) { cancelRenameDir(); return; }
  var parent = _renamingDir.includes('/') ? _renamingDir.slice(0, _renamingDir.lastIndexOf('/')) : '';
  var toPath = parent ? parent + '/' + newName : newName;
  setStatus('重命名中…');
  fetch('/api/rename-register-dir', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ from: _renamingDir, to: toPath })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if (data.ok) {
      setStatus('重命名成功');
      if (curDir === _renamingDir || curDir.startsWith(_renamingDir + '/')) curDir = toPath;
      _renamingDir = null;
      refreshAll();
    } else { setStatus('重命名失败：' + (data.error || '')); cancelRenameDir(); }
  })
  .catch(function(e){ setStatus('请求失败：' + e.message); cancelRenameDir(); });
}

function cancelRenameDir() { _renamingDir = null; renderContent(); }

// ── 单项删除 ──────────────────────────────────────────────
function deleteFile(relPath) {
  if (!confirm('确定删除 ' + relPath + '？')) return;
  setStatus('删除中…');
  fetch('/api/delete-register-file', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: relPath })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if (data.ok) { setStatus('已删除'); refreshAll(); }
    else setStatus('删除失败：' + (data.error || ''));
  })
  .catch(function(e){ setStatus('请求失败：' + e.message); });
}

function deleteDir(dirPath) {
  if (!confirm('确定删除文件夹 ' + dirPath + ' 及其所有内容？')) return;
  setStatus('删除中…');
  fetch('/api/delete-register-dir', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: dirPath })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if (data.ok) {
      setStatus('已删除');
      if (curDir === dirPath || curDir.startsWith(dirPath + '/')) curDir = '';
      refreshAll();
    } else setStatus('删除失败：' + (data.error || ''));
  })
  .catch(function(e){ setStatus('请求失败：' + e.message); });
}

// ── 上传 ─────────────────────────────────────────────────
function doUpload(files) {
  if (!files || !files.length) return;
  var bar = document.getElementById('upload-bar');
  var total = files.length, done = 0, failed = 0;
  bar.style.display = 'block';
  Array.prototype.forEach.call(files, function(file) {
    var ext = file.name.split('.').pop().toLowerCase();
    if (ext !== 'xml' && ext !== 'json') { done++; failed++; updateBar(); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      fetch('/api/save-register-file', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Register-Subdir': curDir,
          'X-Register-Filename': file.name
        },
        body: e.target.result
      })
      .then(function(r){ return r.json(); })
      .then(function(data) { done++; if (!data.ok) failed++; updateBar(); })
      .catch(function() { done++; failed++; updateBar(); });
    };
    reader.readAsText(file, 'UTF-8');
  });
  function updateBar() {
    bar.textContent = '上传中… ' + done + '/' + total + (failed ? '（' + failed + ' 个失败）' : '');
    if (done >= total) {
      setTimeout(function() { bar.style.display = 'none'; }, 2000);
      document.getElementById('upload-input').value = '';
      refreshAll();
    }
  }
}

// ── 新建文件夹 ────────────────────────────────────────────
function openNewDirModal() {
  var sel = document.getElementById('newdir-parent');
  sel.innerHTML = '<option value="">register/（根目录）</option>';
  allDirs.forEach(function(d) {
    sel.innerHTML += '<option value="' + escAttr(d) + '">' + escHtml('register/' + d) + '</option>';
  });
  for (var i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === curDir) { sel.selectedIndex = i; break; }
  }
  document.getElementById('newdir-name').value = '';
  document.getElementById('newdir-modal').classList.add('open');
  setTimeout(function(){ document.getElementById('newdir-name').focus(); }, 50);
}
function closeNewDirModal() {
  document.getElementById('newdir-modal').classList.remove('open');
}
function doCreateDir() {
  var parent = document.getElementById('newdir-parent').value.trim();
  var name   = document.getElementById('newdir-name').value.trim();
  if (!name) { document.getElementById('newdir-name').focus(); return; }
  var subdir = parent ? parent + '/' + name : name;
  fetch('/api/save-register-file', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Register-Subdir': subdir, 'X-Register-Filename': 'placeholder.json' },
    body: '[]'
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    closeNewDirModal();
    if (data.ok) { setStatus('文件夹已创建'); refreshAll(); selectDir(subdir); }
    else setStatus('创建失败：' + (data.error || ''));
  })
  .catch(function(e){ setStatus('请求失败：' + e.message); });
}

// ── 工具 ─────────────────────────────────────────────────
function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

init();
</script>
