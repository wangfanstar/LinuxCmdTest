<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本 ↔ Base64 转换工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 6px;
      font-size: 1.6rem;
      color: #1a1a2e;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 24px;
    }

    .tab-btn {
      padding: 10px 36px;
      border: 2px solid #4a90e2;
      background: #fff;
      color: #4a90e2;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .tab-btn:first-child { border-radius: 6px 0 0 6px; }
    .tab-btn:last-child  { border-radius: 0 6px 6px 0; border-left: none; }

    .tab-btn.active {
      background: #4a90e2;
      color: #fff;
    }

    .tab-btn:not(.active):hover {
      background: #e8f0fb;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px;
      max-width: 98vw;
      margin: 0 auto;
    }

    .row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .col {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: 600;
      font-size: 0.95rem;
      color: #444;
    }

    textarea {
      width: 100%;
      height: calc(100vh - 220px);
      min-height: 400px;
      border: 1.5px solid #d0d7e3;
      border-radius: 6px;
      padding: 12px;
      font-size: 0.88rem;
      font-family: "Consolas", "Courier New", monospace;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      background: #fafbfd;
      color: #222;
    }

    textarea:focus { border-color: #4a90e2; background: #fff; }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 12px;
      flex: 0 0 130px;
      width: 130px;
      padding: 0;
    }

    .actions .btn {
      width: 100%;
      justify-content: center;
      text-align: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary   { background: #4a90e2; color: #fff; }
    .btn-secondary { background: #6c757d; color: #fff; }
    .btn-danger    { background: #e74c3c; color: #fff; }
    .btn-success   { background: #27ae60; color: #fff; }
    .btn-sm        { padding: 7px 14px; font-size: 0.85rem; }

    .btn:hover { opacity: 0.88; }

    .file-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: #fff;
      border: 1.5px solid #4a90e2;
      border-radius: 6px;
      color: #4a90e2;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .file-label:hover { background: #e8f0fb; }
    input[type="file"] { display: none; }

    .status-bar {
      margin-top: 14px;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.88rem;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-bar.info    { background: #e8f3fb; color: #2471a3; border-left: 4px solid #4a90e2; }
    .status-bar.success { background: #eafaf1; color: #1e8449; border-left: 4px solid #27ae60; }
    .status-bar.error   { background: #fdedec; color: #922b21; border-left: 4px solid #e74c3c; }
    .status-bar.hidden  { display: none; }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    @media (max-width: 680px) {
      .row { flex-direction: column; }
      .actions { flex: none; width: 100%; flex-direction: row; flex-wrap: wrap; justify-content: center; }
      textarea { height: 200px; min-height: 200px; }
    }
  </style>
</head>
<body>

<a href="index.html" style="display:block;text-align:center;font-size:13px;color:#6c757d;text-decoration:none;margin-bottom:8px;" title="返回首页">← 返回首页</a>
<h1>文本 ↔ Base64 转换工具</h1>
<p class="subtitle">支持中文、XML、JSON 等任意文本 · 离线可用 · 数据不离开浏览器</p>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('encode', this)">文本 → Base64</button>
  <button class="tab-btn"        onclick="switchTab('decode', this)">Base64 → 文本</button>
</div>

<!-- ========== 编码面板 ========== -->
<div id="panel-encode" class="panel active">
  <div class="card">
    <div class="row">
      <div class="col">
        <label>输入文本</label>
        <div class="file-row">
          <label class="file-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            上传文本文件
            <input type="file" id="enc-file-input" accept="*/*" onchange="loadFile('enc-file-input','enc-input')">
          </label>
          <button class="btn btn-danger btn-sm" onclick="clearArea('enc-input','enc-output','enc-status')">清空</button>
        </div>
        <textarea id="enc-input" placeholder="在此粘贴任意文本（中文、XML、JSON、代码等），或点击上方按钮上传文件…"></textarea>
      </div>

      <div class="actions">
        <button class="btn btn-primary" onclick="encodeText()">编码 →</button>
        <button class="btn btn-secondary btn-sm" onclick="swapToDecoder()">← 去解码</button>
      </div>

      <div class="col">
        <label>Base64 输出</label>
        <div class="toolbar">
          <button class="btn btn-success btn-sm" onclick="copyText('enc-output','enc-status')">复制结果</button>
          <button class="btn btn-secondary btn-sm" onclick="downloadText('enc-output','output.b64','enc-status')">下载文件</button>
        </div>
        <textarea id="enc-output" placeholder="Base64 编码结果将显示在此…" readonly></textarea>
      </div>
    </div>
    <div id="enc-status" class="status-bar hidden"></div>
  </div>
</div>

<!-- ========== 解码面板 ========== -->
<div id="panel-decode" class="panel">
  <div class="card">
    <div class="row">
      <div class="col">
        <label>输入 Base64</label>
        <div class="file-row">
          <label class="file-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            上传 Base64 文件
            <input type="file" id="dec-file-input" accept="*/*" onchange="loadFile('dec-file-input','dec-input')">
          </label>
          <button class="btn btn-danger btn-sm" onclick="clearArea('dec-input','dec-output','dec-status')">清空</button>
        </div>
        <textarea id="dec-input" placeholder="在此粘贴 Base64 编码内容，或点击上方按钮上传文件…"></textarea>
      </div>

      <div class="actions">
        <button class="btn btn-primary" onclick="decodeText()">解码 →</button>
        <button class="btn btn-secondary btn-sm" onclick="swapToEncoder()">← 去编码</button>
      </div>

      <div class="col">
        <label>文本输出</label>
        <div class="toolbar">
          <button class="btn btn-success btn-sm" onclick="copyText('dec-output','dec-status')">复制结果</button>
          <button class="btn btn-secondary btn-sm" onclick="downloadText('dec-output','output.txt','dec-status')">下载文件</button>
        </div>
        <textarea id="dec-output" placeholder="解码后的文本将显示在此…" readonly></textarea>
      </div>
    </div>
    <div id="dec-status" class="status-bar hidden"></div>
  </div>
</div>

<script>
  // ── 标签切换 ──────────────────────────────────────────────
  function switchTab(tab, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    if (btn) btn.classList.add('active');
  }

  // 把编码结果直接送到解码面板
  function swapToDecoder() {
    const val = document.getElementById('enc-output').value;
    if (val) document.getElementById('dec-input').value = val;
    switchTab('decode', document.querySelectorAll('.tab-btn')[1]);
  }

  // 把解码结果直接送到编码面板
  function swapToEncoder() {
    const val = document.getElementById('dec-output').value;
    if (val) document.getElementById('enc-input').value = val;
    switchTab('encode', document.querySelectorAll('.tab-btn')[0]);
  }

  // ── 文件加载 ──────────────────────────────────────────────
  function loadFile(inputId, targetId) {
    const file = document.getElementById(inputId).files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById(targetId).value = e.target.result;
    };
    reader.readAsText(file, 'UTF-8');
    document.getElementById(inputId).value = '';
  }

  // ── UTF-8 安全的 Base64 工具函数 ─────────────────────────
  function utf8ToBase64(str) {
    const bytes = new TextEncoder().encode(str);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  }

  function base64ToUtf8(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }

  // ── 编码：文本 → Base64 ───────────────────────────────────
  function encodeText() {
    const text = document.getElementById('enc-input').value;
    if (!text) { showStatus('enc-status', 'error', '请先输入或上传文本内容。'); return; }
    try {
      const b64 = utf8ToBase64(text);
      document.getElementById('enc-output').value = b64;
      showStatus('enc-status', 'success', `编码成功！原始 ${text.length} 字符 → Base64 ${b64.length} 字符`);
    } catch (e) {
      showStatus('enc-status', 'error', '编码失败：' + e.message);
    }
  }

  // ── 解码：Base64 → 文本 ───────────────────────────────────
  function decodeText() {
    const b64 = document.getElementById('dec-input').value.trim();
    if (!b64) { showStatus('dec-status', 'error', '请先输入或上传 Base64 内容。'); return; }
    try {
      const text = base64ToUtf8(b64);
      document.getElementById('dec-output').value = text;
      showStatus('dec-status', 'success', `解码成功！Base64 ${b64.length} 字符 → 文本 ${text.length} 字符`);
    } catch (e) {
      showStatus('dec-status', 'error', '解码失败，请确认输入为有效的 Base64 字符串。');
    }
  }

  // ── 复制 ──────────────────────────────────────────────────
  function copyText(areaId, statusId) {
    const val = document.getElementById(areaId).value;
    if (!val) { showStatus(statusId, 'error', '没有可复制的内容。'); return; }
    function fallback() {
      const ta = document.getElementById(areaId);
      ta.removeAttribute('readonly');
      ta.select();
      document.execCommand('copy');
      ta.setAttribute('readonly', true);
      showStatus(statusId, 'success', '已复制到剪贴板！');
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(val).then(() => {
        showStatus(statusId, 'success', '已复制到剪贴板！');
      }).catch(fallback);
    } else {
      fallback();
    }
  }

  // ── 下载 ──────────────────────────────────────────────────
  function downloadText(areaId, filename, statusId) {
    const val = document.getElementById(areaId).value;
    if (!val) { showStatus(statusId, 'error', '没有可下载的内容。'); return; }
    const blob = new Blob([val], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showStatus(statusId, 'success', `文件 "${filename}" 已开始下载。`);
  }

  // ── 清空 ──────────────────────────────────────────────────
  function clearArea(inputId, outputId, statusId) {
    document.getElementById(inputId).value = '';
    document.getElementById(outputId).value = '';
    showStatus(statusId, 'hidden', '');
  }

  // ── 状态栏 ────────────────────────────────────────────────
  function showStatus(id, type, msg) {
    const el = document.getElementById(id);
    el.className = 'status-bar ' + type;
    el.textContent = msg;
    if (type !== 'hidden') {
      clearTimeout(el._timer);
      el._timer = setTimeout(() => { el.className = 'status-bar hidden'; }, 5000);
    }
  }
</script>
</body>
</html>
