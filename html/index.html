<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux 命令行测试工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --text:    #c9d1d9;
    --dim:     #8b949e;
    --accent:  #58a6ff;
    --green:   #3fb950;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    padding: 48px 24px;
  }

  /* ── 顶部 ── */
  header {
    max-width: 860px;
    margin: 0 auto 40px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  header h1 { font-size: 1.25rem; font-weight: 700; color: #f0f6fc; }
  header p  { margin-left: auto; font-size: 13px; color: var(--dim); }

  /* ── 网格 ── */
  .grid {
    max-width: 860px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }

  /* ── 卡片 ── */
  a.card {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color .15s, transform .15s, box-shadow .15s;
  }
  a.card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .card-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-icon svg { width: 18px; height: 18px; }
  .card-title { font-size: 14px; font-weight: 600; color: #f0f6fc; }
  .card-desc  { font-size: 12px; color: var(--dim); line-height: 1.6; flex: 1; }
  .card-link  { font-size: 11px; color: var(--accent); margin-top: 4px; }

  /* 图标背景色 */
  .ic-blue   { background: #1f3a6e; color: #58a6ff; }
  .ic-purple { background: #2d1f6e; color: #bc8cff; }
  .ic-green  { background: #1a3a24; color: #3fb950; }
  .ic-yellow { background: #3a2e0a; color: #d29922; }
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>Linux 命令行测试工具</h1>
  <p id="clock"></p>
</header>

<div class="grid">

  <a class="card" href="/logviewer.html">
    <div class="card-icon ic-blue">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
      </svg>
    </div>
    <div class="card-title">日志查看器</div>
    <div class="card-desc">实时查看服务器访问日志，支持级别过滤、关键字搜索与本地文件上传。</div>
    <div class="card-link">logviewer.html →</div>
  </a>


  <a class="card" href="/extract.html">
    <div class="card-icon ic-green">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 6h16M4 12h10M4 18h7"/><path d="M15 15l5 5m0-5l-5 5"/>
      </svg>
    </div>
    <div class="card-title">文本行提取工具</div>
    <div class="card-desc">按规则从文本中批量提取指定行内容，快速整理日志或数据。</div>
    <div class="card-link">extract.html →</div>
  </a>

  <a class="card" href="/ssh_collector.html">
    <div class="card-icon ic-green">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
        <path d="M7 7l3 3-3 3"/><line x1="13" y1="13" x2="17" y2="13"/>
      </svg>
    </div>
    <div class="card-title">SSH 命令信息收集</div>
    <div class="card-desc">输入 SSH 连接信息与命令集合，批量执行并生成可编辑、可下载的 HTML 报告。</div>
    <div class="card-link">ssh_collector.html →</div>
  </a>

  <a class="card" href="/test_plan.html">
    <div class="card-icon ic-yellow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <path d="M9 12l2 2 4-4"/>
      </svg>
    </div>
    <div class="card-title">系统测试用例</div>
    <div class="card-desc">查看系统测试计划与用例，包含测试环境、执行流程与结果记录。</div>
    <div class="card-link">test_plan.html →</div>
  </a>

</div>

<script>
  const cl = document.getElementById('clock');
  function tick() {
    cl.textContent = new Date().toLocaleString('zh-CN', { hour12: false });
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
