<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteWiki 文章索引</title>
<style>
:root{
  --bg:#0d1117;--surf:#161b22;--border:#30363d;--text:#c9d1d9;--dim:#8b949e;--accent:#4a90e2;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
.topbar{height:50px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:14px;flex-shrink:0}
.topbar h1{font-size:.95rem;font-weight:700;color:#f0f6fc}
.topbar a{font-size:12px;color:var(--dim);text-decoration:none}
.topbar a:hover{color:var(--text)}
.topbar .tb-btn{height:28px;padding:0 10px;font-size:.75rem;border-radius:5px;border:1px solid var(--border);background:var(--surf);color:var(--text);cursor:pointer;box-sizing:border-box;vertical-align:middle}
.topbar .tb-btn:hover{background:#21262d}
a.tb-btn{display:inline-block;line-height:1.2}
.search-bar{display:flex;gap:8px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.search-bar input[type="search"]{
  flex:1;min-width:180px;max-width:420px;height:34px;padding:0 12px;font-size:.86rem;
  background:#0d1117;color:var(--text);border:1px solid var(--border);border-radius:6px;outline:none
}
.search-bar input[type="search"]::placeholder{color:var(--dim)}
.search-bar input[type="search"]:focus{border-color:var(--accent)}
.search-bar button{
  height:34px;padding:0 14px;font-size:.82rem;font-weight:600;cursor:pointer;border-radius:6px;
  border:1px solid var(--border);background:var(--surf);color:var(--text)
}
.search-bar button:hover{background:#21262d;border-color:#444}
.wrap{max-width:920px;margin:0 auto;padding:28px 20px 48px}
.lead{font-size:.85rem;color:var(--dim);margin-bottom:22px}
.cat-block{margin-bottom:26px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surf)}
.cat-head{padding:10px 14px;font-size:.82rem;font-weight:600;color:var(--accent);background:#161b22;border-bottom:1px solid var(--border)}
.cat-body{padding:4px 0}
.row{display:flex;align-items:flex-start;gap:12px;padding:8px 14px;border-bottom:1px solid #21262d;font-size:.86rem}
.row:last-child{border-bottom:none}
.row:hover{background:rgba(255,255,255,.04)}
.row-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.row a.art{color:var(--text);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row a.art:hover{color:var(--accent)}
.row .snippet{font-size:.74rem;color:var(--dim);line-height:1.45;white-space:normal;word-break:break-word;margin:0}
.row .snippet mark.hit{background:rgba(74,144,226,.28);color:#e6edf3;padding:0 .05em;border-radius:2px;font:inherit}
.row .meta{font-size:.72rem;color:var(--dim);white-space:nowrap;flex-shrink:0;padding-top:2px}
.empty{padding:14px;color:var(--dim);font-size:.8rem;text-align:center}
.err{color:#f85149;font-size:.86rem;padding:20px}
</style>
</head>
<body>
<div class="topbar">
  <h1>📑 NoteWiki 文章索引</h1>
  <div style="flex:1"></div>
  <a id="link-edit" href="/wiki/notewiki.html">📝 NoteWiki 编辑</a>
  <button type="button" class="tb-btn" id="wiki-refresh-index" title="在服务器上重写 html/wiki/wiki-index.json">🔄 更新离线索引</button>
  <a id="link-wiki-index-dl" class="tb-btn" href="/wiki/wiki-index.json" download="wiki-index.json" title="下载当前 wiki-index.json 用于本地备份/离线" style="display:none;text-decoration:none">⬇ wiki-index.json</a>
  <a id="link-home" href="/index.html">← 网站首页</a>
</div>
<div class="wrap">
  <div class="search-bar">
    <input type="search" id="wiki-search-q" placeholder="搜索标题与正文…" autocomplete="off" aria-label="搜索文章">
    <button type="button" id="wiki-search-go">搜索</button>
    <button type="button" id="wiki-search-clear" title="显示全部文章" style="display:none">全部</button>
    <button type="button" id="wiki-load-local" title="离线模式：加载本地索引文件" style="display:none">加载本地索引</button>
    <input type="file" id="wiki-local-file" accept=".json,application/json" style="display:none">
  </div>
  <p class="lead" id="lead">加载中…</p>
  <div id="index-root"></div>
</div>
<script>
var _wikiIndexFull = null;
var _wikiSearchTimer = null;
var _wikiLastQuery = '';
var _isFileMode = (location.protocol === 'file:');
var _offlinePrimaryIndex = './wiki-index.json';
var _offlineFallbackCandidates = buildOfflineFallbackCandidates();
var _cacheKey = 'notewiki-index-cache-v1';

if (_isFileMode) {
  var loadBtn = document.getElementById('wiki-load-local');
  if (loadBtn) loadBtn.style.display = 'inline-block';
  var editLink = document.getElementById('link-edit');
  var homeLink = document.getElementById('link-home');
  if (editLink) editLink.href = './notewiki.html';
  if (homeLink) homeLink.href = '../index.html';
  var rHide = document.getElementById('wiki-refresh-index');
  var dHide = document.getElementById('link-wiki-index-dl');
  if (rHide) rHide.style.display = 'none';
  if (dHide) dHide.style.display = 'none';
} else {
  var rbi = document.getElementById('wiki-refresh-index');
  var dli = document.getElementById('link-wiki-index-dl');
  if (rbi) {
    rbi.style.display = 'inline-block';
    rbi.addEventListener('click', function(){
      rbi.disabled = true;
      document.getElementById('lead').textContent = '正在更新服务器上的 wiki-index.json…';
      fetch('/api/wiki-refresh-index')
        .then(function(r){ return r.json(); })
        .then(function(d){
          document.getElementById('lead').textContent = (d && d.ok)
            ? '已更新 wiki-index.json。可将「⬇ wiki-index.json」保存到与本页同目录，供 file:// 离线索引。'
            : '更新失败';
        })
        .catch(function(e){
          document.getElementById('lead').textContent = '更新失败：' + e.message;
        })
        .then(function(){ rbi.disabled = false; });
    });
  }
  if (dli) dli.style.display = 'inline-block';
}

function wikiArticleHref(cat, id) {
  var safeId = encodeURIComponent(id).replace(/%20/g,'+');
  if (_isFileMode) {
    if (!cat) return './' + safeId + '.html';
    var relSegs = cat.split('/').map(function(p){ return encodeURIComponent(p); });
    return './' + relSegs.join('/') + '/' + safeId + '.html';
  }
  if (!cat) return '/wiki/' + safeId + '.html';
  var segs = cat.split('/').map(function(p){ return encodeURIComponent(p); });
  return '/wiki/' + segs.join('/') + '/' + safeId + '.html';
}

function isHiddenCategory(cat) {
  return !!cat && (cat === 'vendor' || cat.indexOf('vendor/') === 0);
}

function render(data, leadText) {
  var arts = (data.articles || []).filter(function(a){
    return !isHiddenCategory(a.category || '');
  });
  var catsFromServer = (data.categories || []).filter(function(c){
    return !isHiddenCategory(c);
  });
  var by = {};
  arts.forEach(function(a){
    var c = a.category || '';
    if (!by[c]) by[c] = [];
    by[c].push(a);
  });
  Object.keys(by).forEach(function(c){
    by[c].sort(function(a,b){ return (b.updated||'').localeCompare(a.updated||''); });
  });
  var catList = Object.keys(by);
  catsFromServer.forEach(function(c){
    if (catList.indexOf(c) === -1) { by[c] = []; catList.push(c); }
  });
  catList.sort(function(a,b){
    if (a === '') return -1;
    if (b === '') return 1;
    return a.localeCompare(b);
  });

  var html = '';
  catList.forEach(function(cat){
    var list = by[cat] || [];
    var label = cat ? cat : '根目录';
    html += '<div class="cat-block">';
    html += '<div class="cat-head">📂 ' + esc(cat || '根目录') + ' <span style="font-weight:400;color:var(--dim)">(' + list.length + ')</span></div>';
    html += '<div class="cat-body">';
    if (!list.length) {
      html += '<div class="empty">暂无文章</div>';
    } else {
      list.forEach(function(a){
        var href = wikiArticleHref(a.category || '', a.id);
        var upd = (a.updated || '').replace('T',' ').replace('Z','').slice(0,16);
        html += '<div class="row">';
        html += '<div class="row-main">';
        html += '<a class="art" href="' + escAttr(href) + '">' + esc(a.title || a.id) + '</a>';
        if (a.snippet) {
          html += '<p class="snippet">' + escSnippetHighlight(a.snippet, _wikiLastQuery) + '</p>';
        }
        html += '</div>';
        html += '<span class="meta">' + esc(upd || '—') + '</span>';
        html += '</div>';
      });
    }
    html += '</div></div>';
  });

  document.getElementById('index-root').innerHTML = html || '<p class="empty">暂无数据</p>';
  if (leadText != null && leadText !== '') {
    document.getElementById('lead').textContent = leadText;
  } else {
    document.getElementById('lead').textContent = '共 ' + arts.length + ' 篇文章 · 点击标题打开已发布页面';
  }
  var q = (document.getElementById('wiki-search-q').value || '').trim();
  var clr = document.getElementById('wiki-search-clear');
  if (clr) clr.style.display = q ? 'inline-block' : 'none';
}

function runWikiSearch() {
  var q = (document.getElementById('wiki-search-q').value || '').trim();
  if (!q) {
    _wikiLastQuery = '';
    if (_wikiIndexFull) render(_wikiIndexFull);
    return;
  }
  if (_isFileMode) {
    document.getElementById('lead').textContent = '离线模式不支持服务端全文搜索，请先加载本地索引并按标题浏览';
    return;
  }
  document.getElementById('lead').textContent = '搜索中…';
  fetch('/api/wiki-search?q=' + encodeURIComponent(q))
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data){
      if (!data.ok) throw new Error(data.error || '搜索失败');
      var arts = (data.articles || []).filter(function(a){
        return !isHiddenCategory(a.category || '');
      });
      var n = arts.length;
      var catSet = {};
      arts.forEach(function(a){ catSet[a.category || ''] = 1; });
      var cats = Object.keys(catSet);
      cats.sort(function(a,b){
        if (a === '') return -1;
        if (b === '') return 1;
        return a.localeCompare(b);
      });
      _wikiLastQuery = q;
      render({ articles: arts, categories: cats },
        '搜索「' + q + '」· ' + n + ' 篇 · 匹配标题与正文（不区分大小写）');
    })
    .catch(function(e){
      document.getElementById('lead').textContent = '搜索失败：' + e.message;
    });
}

document.getElementById('wiki-search-go').addEventListener('click', runWikiSearch);
document.getElementById('wiki-search-q').addEventListener('keydown', function(e){
  if (e.key === 'Enter') { e.preventDefault(); runWikiSearch(); }
});
document.getElementById('wiki-search-q').addEventListener('input', function(){
  var self = this;
  if (_wikiSearchTimer) clearTimeout(_wikiSearchTimer);
  _wikiSearchTimer = setTimeout(function(){
    if (!(self.value || '').trim()) {
      _wikiLastQuery = '';
      if (_wikiIndexFull) render(_wikiIndexFull);
    }
  }, 320);
});
document.getElementById('wiki-search-clear').addEventListener('click', function(){
  document.getElementById('wiki-search-q').value = '';
  _wikiLastQuery = '';
  if (_wikiIndexFull) render(_wikiIndexFull);
});

function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s){
  return esc(s).replace(/"/g,'&quot;');
}
/** 转义后在文本中高亮所有与 q 不区分大小写匹配的子串（用于摘要） */
function escSnippetHighlight(text, q) {
  if (!text) return '';
  if (!q) return esc(text);
  var lower = text.toLowerCase();
  var lq = q.toLowerCase();
  if (!lq) return esc(text);
  var out = '';
  var pos = 0;
  var idx;
  while ((idx = lower.indexOf(lq, pos)) >= 0) {
    out += esc(text.slice(pos, idx));
    out += '<mark class="hit">' + esc(text.slice(idx, idx + q.length)) + '</mark>';
    pos = idx + q.length;
  }
  out += esc(text.slice(pos));
  return out;
}

function saveIndexCache(data) {
  try {
    localStorage.setItem(_cacheKey, JSON.stringify({ ts: Date.now(), data: data }));
  } catch (e) {}
}

function loadIndexCache() {
  try {
    var raw = localStorage.getItem(_cacheKey);
    if (!raw) return null;
    var obj = JSON.parse(raw);
    if (!obj || !obj.data) return null;
    return obj.data;
  } catch (e) {
    return null;
  }
}

function applyIndexData(data, lead) {
  _wikiIndexFull = data;
  render(data, lead || '');
}

function parseLocalIndexText(text) {
  var t = String(text || '').replace(/^\uFEFF/, '');
  var data = JSON.parse(t);
  if (!data || typeof data !== 'object') throw new Error('JSON 格式无效');
  if (!Array.isArray(data.articles)) throw new Error('缺少 articles 数组');
  if (!Array.isArray(data.categories)) data.categories = [];
  return data;
}

function bindOfflineFileLoader() {
  var btn = document.getElementById('wiki-load-local');
  var inp = document.getElementById('wiki-local-file');
  if (!btn || !inp) return;
  btn.addEventListener('click', function(){ inp.click(); });
  inp.addEventListener('change', function(){
    var f = inp.files && inp.files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function(){
      try {
        var data = parseLocalIndexText(String(reader.result || ''));
        applyIndexData(data, '离线索引：' + f.name + '（' + data.articles.length + ' 篇）');
      } catch (e) {
        document.getElementById('lead').textContent = '本地索引加载失败：' + e.message;
      }
    };
    reader.onerror = function(){ document.getElementById('lead').textContent = '本地索引读取失败'; };
    reader.readAsText(f, 'utf-8');
  });
}

function bootOnlineMode() {
  fetch('/api/wiki-list')
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data){
      applyIndexData(data);
      saveIndexCache(data);
    })
    .catch(function(e){
      document.getElementById('lead').textContent = '';
      document.getElementById('index-root').innerHTML = '<p class="err">加载失败：'+esc(e.message)+'</p>';
    });
}

function tryOfflineCandidates(list, i) {
  if (!Array.isArray(list) || i >= list.length) return Promise.reject(new Error('无可用候选'));
  return loadOfflineIndexFromPath(list[i])
    .then(function(text){ return parseLocalIndexText(text); })
    .catch(function(e){
      if (i >= list.length - 1) throw e || new Error('无可用候选');
      return tryOfflineCandidates(list, i + 1);
    });
}

function errText(e) {
  if (!e) return '未知错误';
  return (e.message || String(e)).replace(/\s+/g, ' ').trim();
}

function buildOfflineFallbackCandidates() {
  var out = ['../wiki-index.json'];
  if (_isFileMode) {
    try {
      var sameDirAbs = new URL('wiki-index.json', location.href).href;
      if (out.indexOf(sameDirAbs) < 0) out.unshift(sameDirAbs);
    } catch (e) {}
    if (out.indexOf('wiki-index.json') < 0) out.unshift('wiki-index.json');
  }
  return out;
}

function isLikelyFileProtocolBlocked(msg) {
  var m = String(msg || '').toLowerCase();
  return _isFileMode && (m.indexOf('xhr 0') >= 0 || m.indexOf('failed to fetch') >= 0);
}

function showOfflineDiag(lines) {
  var lead = document.getElementById('lead');
  if (!lead) return;
  var safe = (lines || []).map(function(s){ return esc(String(s)); });
  lead.innerHTML =
    '<span style="color:#f85149;font-weight:600">离线自动加载失败</span>'
    + '<br><span style="font-size:.78rem;color:var(--dim);line-height:1.5">'
    + safe.join('<br>')
    + '</span>';
}

function loadOfflineIndexFromPath(path) {
  return fetch(path)
    .then(function(r){
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .catch(function(){
      /* 某些浏览器 file:// 下 fetch 本地文件受限，回退到 XHR */
      return new Promise(function(resolve, reject){
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', path, true);
          xhr.onreadystatechange = function(){
            if (xhr.readyState !== 4) return;
            if ((xhr.status >= 200 && xhr.status < 300) || (xhr.status === 0 && xhr.responseText)) {
              resolve(xhr.responseText);
            } else {
              reject(new Error('XHR ' + xhr.status));
            }
          };
          xhr.onerror = function(){ reject(new Error('XHR error')); };
          xhr.send();
        } catch (e) {
          reject(e);
        }
      });
    });
}

function bootOfflineMode() {
  bindOfflineFileLoader();
  document.getElementById('lead').textContent = '离线模式：优先加载同目录 wiki-index.json…';
  var diag = [];
  loadOfflineIndexFromPath(_offlinePrimaryIndex)
    .then(function(text){ return parseLocalIndexText(text); })
    .then(function(data){
      applyIndexData(data, '离线模式：已优先加载同目录 wiki-index.json（' + data.articles.length + ' 篇）');
    })
    .catch(function(e0){
      diag.push('同目录 ./wiki-index.json：' + errText(e0));
      if (isLikelyFileProtocolBlocked(errText(e0))) {
        diag.push('检测到浏览器限制：Windows 下 file:// 页面通常禁止脚本自动读取同目录文件');
      }
      var cached = loadIndexCache();
      if (cached) {
        applyIndexData(cached, '离线模式：同目录索引不可用，已回退缓存索引（可点击“加载本地索引”替换）');
      } else {
        document.getElementById('lead').textContent = '离线模式：同目录 wiki-index.json 不可用，正在尝试其他位置…';
      }
      return tryOfflineCandidates(_offlineFallbackCandidates, 0)
        .then(function(data){
          applyIndexData(data, '离线模式：已加载备用位置 wiki-index.json（' + data.articles.length + ' 篇）');
        })
        .catch(function(e1){
          diag.push('备用路径（含绝对 file:// 形式）：' + errText(e1));
          if (!cached) {
            if (isLikelyFileProtocolBlocked(errText(e0)) || isLikelyFileProtocolBlocked(errText(e1))) {
              diag.push('建议：使用本地 HTTP 打开本页（例如在 html 目录启动本地服务），或手动点「加载本地索引」');
            }
            diag.push('可操作：点击「加载本地索引」手动选择同目录 wiki-index.json');
            showOfflineDiag(diag);
          } else {
            diag.push('已使用缓存索引展示，可点击「加载本地索引」替换');
            showOfflineDiag(diag);
          }
        });
    });
}

if (_isFileMode) bootOfflineMode();
else bootOnlineMode();
</script>
</body>
</html>
