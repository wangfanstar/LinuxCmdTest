<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register 文件管理</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --surface2:#1e2740;
  --border:  #30363d;
  --border2: #2d3a54;
  --text:    #c9d1d9;
  --dim:     #8b949e;
  --accent:  #4a90e2;
  --green:   #3fb950;
  --red:     #f85149;
  --yellow:  #d29922;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── 顶栏 ── */
.topbar {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
}
.topbar h1 { font-size: 1rem; font-weight: 700; color: #f0f6fc; }
.topbar-sep { flex: 1; }
.topbar a { font-size: 13px; color: var(--dim); text-decoration: none; }
.topbar a:hover { color: var(--text); }

/* ── 工具栏 ── */
.toolbar {
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.search-box {
  flex: 1; min-width: 200px; max-width: 360px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  color: var(--text);
  font-size: 0.85rem;
  outline: none;
}
.search-box:focus { border-color: var(--accent); }
.btn {
  padding: 6px 14px;
  border: none;
  border-radius: 6px;
  font-size: 0.82rem;
  cursor: pointer;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: opacity .15s;
}
.btn:hover { opacity: .85; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary  { background: var(--accent); color: #fff; }
.btn-secondary{ background: #27334d; color: var(--text); border: 1px solid var(--border2); }
.btn-danger   { background: #3a1a1a; color: var(--red); border: 1px solid #5a2a2a; }
.status-msg { font-size: 0.8rem; color: var(--dim); }

/* ── 主体布局 ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── 左侧目录树 ── */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}
.tree-label {
  padding: 5px 16px;
  font-size: 0.75rem;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.tree-node {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  cursor: pointer;
  font-size: 0.84rem;
  color: var(--text);
  border-left: 2px solid transparent;
  transition: background .1s;
}
.tree-node:hover { background: rgba(255,255,255,.04); }
.tree-node.active {
  background: rgba(74,144,226,.12);
  border-left-color: var(--accent);
  color: #f0f6fc;
}
.tree-node .icon { font-size: 0.9rem; }

/* ── 右侧文件列表 ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}
.path-bar {
  font-size: 0.82rem;
  color: var(--dim);
  margin-bottom: 14px;
}
.path-bar span { color: var(--text); }

/* 文件卡片网格 */
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}
.file-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color .15s;
}
.file-card:hover { border-color: #3a4e70; }
.file-card.renaming { border-color: var(--accent); }
.file-icon {
  font-size: 1.3rem;
  flex-shrink: 0;
}
.file-info { flex: 1; min-width: 0; }
.file-name {
  font-size: 0.85rem;
  font-weight: 600;
  color: #f0f6fc;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-name-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--accent);
  border-radius: 4px;
  color: #f0f6fc;
  font-size: 0.85rem;
  padding: 2px 6px;
  outline: none;
}
.file-meta {
  font-size: 0.72rem;
  color: var(--dim);
  margin-top: 2px;
}
.ext-badge {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
}
.ext-xml  { background: #1f3a6e; color: #7ab8ff; }
.ext-json { background: #1a3a24; color: #7cdba0; }
.file-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.icon-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 4px;
  font-size: 0.85rem;
  color: var(--dim);
  transition: background .1s, color .1s;
}
.icon-btn:hover { background: rgba(255,255,255,.06); color: var(--text); }
.icon-btn.confirm { color: var(--green); }
.icon-btn.cancel  { color: var(--red); }
.icon-btn.del     { color: var(--red); }

.empty-tip {
  text-align: center;
  color: var(--dim);
  font-size: 0.85rem;
  padding: 40px 0;
}

/* ── 上传进度 overlay ── */
.upload-bar {
  display: none;
  position: fixed;
  bottom: 20px; right: 20px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 18px;
  font-size: 0.82rem;
  color: var(--text);
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
  z-index: 999;
  min-width: 220px;
}

/* ── 新建文件夹弹窗 ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 9999;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  width: 360px;
  max-width: 94vw;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.modal-head {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-weight: 600;
  font-size: 0.9rem;
  color: #f0f6fc;
}
.modal-body { padding: 16px; }
.modal-foot {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border2);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.field-label { font-size: 0.8rem; color: var(--dim); margin-bottom: 5px; display: block; }
.field-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 5px;
  color: var(--text);
  font-size: 0.82rem;
  padding: 6px 9px;
  outline: none;
  margin-bottom: 10px;
}
.field-input:focus { border-color: var(--accent); }
.close-btn {
  background: none;
  border: none;
  color: var(--dim);
  font-size: 1.1rem;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
}
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <h1>📁 Register 文件管理</h1>
  <div class="topbar-sep"></div>
  <a href="index.html">← 返回首页</a>
</div>

<!-- 工具栏 -->
<div class="toolbar">
  <input class="search-box" id="search-input" type="text" placeholder="搜索文件名…" oninput="renderContent()">
  <button class="btn btn-primary" onclick="triggerUpload()">⬆ 上传文件</button>
  <button class="btn btn-secondary" onclick="openNewDirModal()">＋ 新建文件夹</button>
  <button class="btn btn-secondary" onclick="refreshAll()">↺ 刷新</button>
  <span class="status-msg" id="status-msg"></span>
  <input type="file" id="upload-input" multiple accept=".xml,.json" style="display:none" onchange="doUpload(this.files)">
</div>

<!-- 主体 -->
<div class="layout">
  <!-- 目录树 -->
  <div class="sidebar" id="sidebar">
    <div class="tree-label">文件夹</div>
    <div id="tree-root"></div>
  </div>

  <!-- 文件内容 -->
  <div class="content">
    <div class="path-bar" id="path-bar">register/</div>
    <div class="file-grid" id="file-grid"></div>
    <div class="empty-tip" id="empty-tip" style="display:none">该文件夹为空</div>
  </div>
</div>

<!-- 上传进度条 -->
<div class="upload-bar" id="upload-bar"></div>

<!-- 新建文件夹弹窗 -->
<div class="modal-overlay" id="newdir-modal">
  <div class="modal-box">
    <div class="modal-head">
      ＋ 新建子文件夹
      <button class="close-btn" onclick="closeNewDirModal()">✕</button>
    </div>
    <div class="modal-body">
      <label class="field-label">父文件夹</label>
      <select id="newdir-parent" class="field-input">
        <option value="">register/（根目录）</option>
      </select>
      <label class="field-label">文件夹名称</label>
      <input id="newdir-name" class="field-input" type="text" placeholder="例：chip_A" spellcheck="false"
             onkeydown="if(event.key==='Enter')doCreateDir()">
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeNewDirModal()">取消</button>
      <button class="btn btn-primary" onclick="doCreateDir()">创建</button>
    </div>
  </div>
</div>

<script>
// ── 状态 ──────────────────────────────────────────────────
var allFiles  = [];   // [{relPath, dir, name, ext}]
var allDirs   = [];   // 相对路径字符串数组
var curDir    = '';   // 当前选中目录（相对于 register/，空=根）

// ── 初始化 ────────────────────────────────────────────────
function init() {
  refreshAll();
}

function refreshAll() {
  setStatus('加载中…');
  Promise.all([
    fetch('/api/list-register-files').then(function(r){ return r.json(); }),
    fetch('/api/list-register-dirs').then(function(r){ return r.json(); })
  ]).then(function(results) {
    var filesData = results[0], dirsData = results[1];
    allFiles = (filesData.files || []).map(function(relPath) {
      var slash = relPath.lastIndexOf('/');
      return {
        relPath: relPath,
        dir:  slash >= 0 ? relPath.slice(0, slash) : '',
        name: slash >= 0 ? relPath.slice(slash + 1) : relPath,
        ext:  relPath.split('.').pop().toLowerCase()
      };
    });
    allDirs = dirsData.dirs || [];
    renderTree();
    renderContent();
    setStatus('');
  }).catch(function(e) {
    setStatus('加载失败：' + e.message);
  });
}

// ── 目录树 ────────────────────────────────────────────────
function renderTree() {
  var root = document.getElementById('tree-root');

  // 构建目录层级
  var tree = {};   // 子目录 map
  allDirs.forEach(function(d) {
    var parts = d.split('/');
    var cur = tree;
    parts.forEach(function(p) {
      if (!cur[p]) cur[p] = {};
      cur = cur[p];
    });
  });

  function renderSubtree(node, prefix, depth) {
    var h = '';
    Object.keys(node).sort().forEach(function(name) {
      var path = prefix ? prefix + '/' + name : name;
      var indent = depth * 14;
      h += '<div class="tree-node' + (curDir === path ? ' active' : '') + '" '
         + 'onclick="selectDir(\'' + escAttr(path) + '\')" '
         + 'style="padding-left:' + (16 + indent) + 'px;">'
         + '<span class="icon">📂</span>' + escHtml(name) + '</div>';
      h += renderSubtree(node[name], path, depth + 1);
    });
    return h;
  }

  html = '<div class="tree-node' + (curDir === '' ? ' active' : '') + '" onclick="selectDir(\'\')">'
       + '<span class="icon">📁</span>register/</div>'
       + renderSubtree(tree, '', 0);

  root.innerHTML = html;
}

function selectDir(dir) {
  curDir = dir;
  renderTree();
  renderContent();
}

// ── 文件列表 ──────────────────────────────────────────────
function renderContent() {
  var q   = (document.getElementById('search-input').value || '').trim().toLowerCase();
  var bar = document.getElementById('path-bar');
  bar.innerHTML = 'register/' + (curDir ? '<span>/' + escHtml(curDir) + '</span>' : '');

  var files = allFiles.filter(function(f) {
    var inDir = curDir === '' ? true : (f.dir === curDir || f.dir.startsWith(curDir + '/'));
    var match = !q || f.name.toLowerCase().includes(q);
    return inDir && match;
  });

  // 若在根目录但有子目录筛选，仅显示当前层文件
  if (curDir !== '') {
    files = files.filter(function(f) { return f.dir === curDir; });
  }

  var grid  = document.getElementById('file-grid');
  var empty = document.getElementById('empty-tip');

  if (!files.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = files.map(function(f) {
    var icon = f.ext === 'json' ? '📄' : '🗂';
    var badge = '<span class="ext-badge ext-' + f.ext + '">' + f.ext.toUpperCase() + '</span>';
    var subLabel = (curDir === '' && f.dir) ? '<div class="file-meta">📂 ' + escHtml(f.dir) + '</div>' : '';
    return '<div class="file-card" id="card-' + escAttr(f.relPath) + '">'
         + '<span class="file-icon">' + icon + '</span>'
         + '<div class="file-info">'
         +   '<div class="file-name" id="fname-' + escAttr(f.relPath) + '">' + escHtml(f.name) + '</div>'
         +   subLabel
         + '</div>'
         + badge
         + '<div class="file-actions">'
         +   '<a class="icon-btn" href="/register/' + encodeURI(f.relPath) + '" download title="下载">⬇</a>'
         +   '<button class="icon-btn" title="重命名" onclick="startRename(' + JSON.stringify(f.relPath) + ')">✏</button>'
         +   '<button class="icon-btn del" title="删除" onclick="deleteFile(' + JSON.stringify(f.relPath) + ')">🗑</button>'
         + '</div>'
         + '</div>';
  }).join('');
}

// ── 重命名 ────────────────────────────────────────────────
var _renamingPath = null;
function startRename(relPath) {
  if (_renamingPath) cancelRename();
  _renamingPath = relPath;

  var f = allFiles.find(function(x){ return x.relPath === relPath; });
  if (!f) return;

  var card = document.getElementById('card-' + relPath);
  if (!card) return;
  card.classList.add('renaming');

  var nameEl = document.getElementById('fname-' + relPath);
  var inp = document.createElement('input');
  inp.className = 'file-name-input';
  inp.value = f.name;
  inp.id = 'rename-inp';
  inp.onkeydown = function(e) {
    if (e.key === 'Enter') confirmRename();
    if (e.key === 'Escape') cancelRename();
  };
  nameEl.replaceWith(inp);
  inp.focus();
  inp.select();

  // 替换操作按钮为确认/取消
  var acts = card.querySelector('.file-actions');
  acts.innerHTML =
    '<button class="icon-btn confirm" title="确认" onclick="confirmRename()">✓</button>' +
    '<button class="icon-btn cancel"  title="取消" onclick="cancelRename()">✕</button>';
}

function confirmRename() {
  if (!_renamingPath) return;
  var inp = document.getElementById('rename-inp');
  if (!inp) return;
  var newName = inp.value.trim();
  if (!newName) { inp.focus(); return; }

  var f = allFiles.find(function(x){ return x.relPath === _renamingPath; });
  if (!f) { cancelRename(); return; }

  if (newName === f.name) { cancelRename(); return; }

  // 确保新文件名有合法扩展名
  if (!newName.endsWith('.json') && !newName.endsWith('.xml'))
    newName = newName + '.' + f.ext;

  var toPath = f.dir ? f.dir + '/' + newName : newName;

  setStatus('重命名中…');
  fetch('/api/rename-register-file', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ from: _renamingPath, to: toPath })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if (data.ok) {
      setStatus('重命名成功');
      _renamingPath = null;
      refreshAll();
    } else {
      setStatus('重命名失败：' + (data.error || ''));
      cancelRename();
    }
  })
  .catch(function(e) { setStatus('请求失败：' + e.message); cancelRename(); });
}

function cancelRename() {
  _renamingPath = null;
  renderContent();
}

// ── 删除 ─────────────────────────────────────────────────
function deleteFile(relPath) {
  if (!confirm('确定删除 ' + relPath + '？')) return;
  setStatus('删除中…');
  fetch('/api/delete-register-file', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: relPath })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if (data.ok) { setStatus('已删除'); refreshAll(); }
    else setStatus('删除失败：' + (data.error || ''));
  })
  .catch(function(e){ setStatus('请求失败：' + e.message); });
}

// ── 上传 ─────────────────────────────────────────────────
function triggerUpload() {
  document.getElementById('upload-input').click();
}

function doUpload(files) {
  if (!files || !files.length) return;
  var bar = document.getElementById('upload-bar');
  var total = files.length, done = 0, failed = 0;
  bar.style.display = 'block';

  Array.prototype.forEach.call(files, function(file) {
    var ext = file.name.split('.').pop().toLowerCase();
    if (ext !== 'xml' && ext !== 'json') { done++; failed++; updateBar(); return; }

    var reader = new FileReader();
    reader.onload = function(e) {
      fetch('/api/save-register-file', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Register-Subdir': curDir,
          'X-Register-Filename': file.name
        },
        body: e.target.result
      })
      .then(function(r){ return r.json(); })
      .then(function(data) {
        done++;
        if (!data.ok) failed++;
        updateBar();
      })
      .catch(function() { done++; failed++; updateBar(); });
    };
    reader.readAsText(file, 'UTF-8');
  });

  function updateBar() {
    bar.textContent = '上传中… ' + done + '/' + total + (failed ? '（' + failed + ' 个失败）' : '');
    if (done >= total) {
      setTimeout(function() { bar.style.display = 'none'; }, 2000);
      refreshAll();
      // 重置 input 以允许重新选择同名文件
      document.getElementById('upload-input').value = '';
    }
  }
}

// ── 新建文件夹 ────────────────────────────────────────────
function openNewDirModal() {
  var sel = document.getElementById('newdir-parent');
  sel.innerHTML = '<option value="">register/（根目录）</option>';
  allDirs.forEach(function(d) {
    sel.innerHTML += '<option value="' + escAttr(d) + '">' + escHtml('register/' + d) + '</option>';
  });
  // 默认选中当前目录
  if (curDir) {
    for (var i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === curDir) { sel.selectedIndex = i; break; }
    }
  }
  document.getElementById('newdir-name').value = '';
  document.getElementById('newdir-modal').classList.add('open');
  setTimeout(function(){ document.getElementById('newdir-name').focus(); }, 50);
}
function closeNewDirModal() {
  document.getElementById('newdir-modal').classList.remove('open');
}

function doCreateDir() {
  var parent  = document.getElementById('newdir-parent').value.trim();
  var name    = document.getElementById('newdir-name').value.trim();
  if (!name) { document.getElementById('newdir-name').focus(); return; }

  var subdir   = parent ? parent + '/' + name : name;
  var filename = '.gitkeep';   // 创建占位文件使目录在服务器端存在

  fetch('/api/save-register-file', {
    method: 'POST',
    headers: {
      'Content-Type': 'text/plain',
      'X-Register-Subdir': subdir,
      'X-Register-Filename': 'placeholder.json'
    },
    body: '[]'
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    closeNewDirModal();
    if (data.ok) {
      setStatus('文件夹 ' + subdir + ' 已创建');
      refreshAll();
      selectDir(subdir);
    } else {
      setStatus('创建失败：' + (data.error || ''));
    }
  })
  .catch(function(e){ setStatus('请求失败：' + e.message); });
}

// ── 工具函数 ──────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}
function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return (s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

init();
</script>
</body>
</html>
