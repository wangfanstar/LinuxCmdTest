<script>
function showToast(msg){
  var t=document.getElementById('_wk_toast');
  if(!t){
    t=document.createElement('div');
    t.id='_wk_toast';
    t.style.cssText='position:fixed;bottom:28px;right:28px;z-index:99999;'
      +'background:#238636;color:#fff;padding:10px 22px;'
      +'border-radius:8px;font-size:14px;font-weight:500;'
      +'box-shadow:0 4px 16px rgba(0,0,0,.6);display:none;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.display='block';
  clearTimeout(t._tid);
  t._tid=setTimeout(function(){t.style.display='none';},2500);
}
function execCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text;
  ta.style.cssText='position:fixed;top:0;left:0;width:1px;height:1px;opacity:0';
  document.body.appendChild(ta);
  ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);
  var ok=false;try{ok=document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
  return ok;
}
function copyText(text,msg){
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text)
      .then(function(){showToast(msg);})
      .catch(function(){if(execCopy(text))showToast(msg);});
  } else {
    if(execCopy(text))showToast(msg);
  }
}
function exportMdZip(){
  if(window.location.protocol==='file:'){
    showToast('离线模式不支持导出 MD ZIP');
    return;
  }
  var a=document.createElement('a');
  a.href='/api/wiki-export-md-zip?id='+encodeURIComponent(window.WIKI_CUR_ID||'');
  a.style.display='none';document.body.appendChild(a);a.click();document.body.removeChild(a);
}
/* exportPdf 由 sidebar.js 注入，与 notewiki 一致 */
document.addEventListener('click', function(e){
  var btn = e.target.closest('.ab .code-block .copy-btn');
  if (!btn) return;
  var pre = btn.parentElement ? btn.parentElement.querySelector('pre') : null;
  var text = pre ? pre.textContent : '';
  copyText(text, '✓ 代码已复制到剪贴板');
  var orig = btn.textContent;
  btn.textContent = '✓ 已复制';
  btn.classList.add('copied');
  setTimeout(function(){btn.textContent = orig; btn.classList.remove('copied');}, 1600);
});
</script>
